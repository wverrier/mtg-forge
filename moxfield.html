<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORGE // MOXFIELD 007</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gunmetal: #111c1e; --dark: #1a2527; --cyan: #4dd9f0; }
        body { background: var(--gunmetal); color: #e8eef0; font-family: 'Rajdhani', sans-serif; min-height: 100vh; }
        .panel { background: var(--dark); border: 1px solid rgba(77,217,240,0.1); }
        textarea { background: rgba(0,0,0,0.3) !important; border: 1px solid rgba(77,217,240,0.2) !important; color: #4dd9f0 !important; font-family: monospace; }
        .btn-primary { background: transparent; border: 1px solid var(--cyan); color: var(--cyan); font-family: 'Bebas Neue'; transition: 0.2s; cursor: pointer; }
        .btn-primary:hover { background: var(--cyan); color: var(--gunmetal); box-shadow: 0 0 15px var(--cyan); }
        .nav-tab { cursor: pointer; padding: 6px 16px; border-bottom: 2px solid transparent; font-size: 13px; font-weight: 600; letter-spacing: 1px; transition: 0.3s; color: #64748b; }
        .nav-tab.active { color: var(--cyan); border-bottom: 2px solid var(--cyan); background: rgba(77,217,240,0.05); }
    </style>
</head>
<body x-data="moxfieldTranslator()">

    <div class="max-w-4xl mx-auto py-12 px-6">
        <header class="mb-8 border-b border-cyan-400/20 pb-6 flex justify-between items-end">
            <div>
                <h1 class="text-5xl font-bold text-cyan-400 italic" style="font-family: 'Bebas Neue'">MOXFIELD // TRANSLATOR</h1>
                <p class="text-slate-400 text-sm tracking-widest uppercase">V15: CSV File Export & Text Clipboard</p>
            </div>
            
            <nav class="flex bg-black/20 rounded-t-lg overflow-hidden">
                <div @click="mode = 'csv'; output = ''" :class="mode === 'csv' ? 'nav-tab active' : 'nav-tab'">1. CSV (COLLECTION)</div>
                <div @click="mode = 'txt'; output = ''" :class="mode === 'txt' ? 'nav-tab active' : 'nav-tab'">2. TXT (DECKLIST)</div>
            </nav>
        </header>

        <div class="grid gap-6">
            <div class="panel p-6">
                <label class="block text-[10px] font-bold text-cyan-400 mb-2 uppercase tracking-widest">Input Raw Forge Data</label>
                <textarea x-model="rawInput" rows="8" class="w-full p-4 rounded focus:outline-none focus:border-cyan-400" placeholder="Paste data here..."></textarea>
            </div>

            <div class="flex justify-center">
                <button @click="processData()" class="btn-primary px-16 py-3 text-xl uppercase italic" 
                        x-text="mode === 'csv' ? 'Prepare CSV Export' : 'Format for Clipboard'"></button>
            </div>

            <div class="panel p-6" x-show="output">
                <div class="flex justify-between items-center mb-3">
                    <label class="text-[10px] font-bold text-cyan-400 uppercase tracking-widest" 
                           x-text="mode === 'csv' ? 'CSV Preview' : 'Decklist Preview'"></label>
                    
                    <div class="flex gap-2">
                        <template x-if="mode === 'csv'">
                            <button @click="downloadCSV()" class="text-[11px] font-bold text-black bg-cyan-400 px-4 py-1.5 hover:bg-white transition uppercase rounded">Download .CSV File</button>
                        </template>
                        
                        <template x-if="mode === 'txt'">
                            <button @click="copyToClipboard()" class="text-[11px] font-bold text-black bg-cyan-400 px-4 py-1.5 hover:bg-white transition uppercase rounded">Copy to Clipboard</button>
                        </template>
                    </div>
                </div>
                <textarea x-model="output" readonly rows="10" class="w-full p-4 rounded opacity-80 text-sm" id="outputArea"></textarea>
            </div>
        </div>
    </div>

    <script>
        function moxfieldTranslator() {
            return {
                mode: 'csv',
                rawInput: '',
                output: '',
                
                processData() {
                    if (!this.rawInput.trim()) return;
                    const lines = this.rawInput.split('\n');
                    let results = [];

                    if (this.mode === 'csv') {
                        results.push('Count,Name,Edition,Condition,Language,Foil,Collector Number');
                    }
                    
                    lines.forEach(line => {
                        const trimmed = line.trim();
                        if (!trimmed) return;

                        const countMatch = trimmed.match(/^(\d+)\s+/);
                        if (!countMatch) return;
                        const count = countMatch[1];
                        let remainder = trimmed.substring(countMatch[0].length).trim();

                        const setMatch = remainder.match(/\[(.*?)\]/);
                        if (!setMatch) return;
                        let set = setMatch[1].trim();
                        
                        const setIndex = remainder.indexOf(setMatch[0]);
                        let namePart = remainder.substring(0, setIndex).trim();
                        let extraPart = remainder.substring(setIndex + setMatch[0].length).trim();

                        if (namePart.toLowerCase().includes('token') || namePart.toLowerCase().includes('art series')) return;

                        let isFoil = /foil/i.test(extraPart + namePart);
                        const listSetMatch = namePart.match(/\((.*?)\)/);
                        let specificSet = (set === 'LIST' || set === 'SPG') && listSetMatch ? listSetMatch[1] : set;

                        if (namePart.includes(" - ") && ['FCA', 'SLD'].includes(specificSet)) {
                            namePart = namePart.split(" - ").pop().trim();
                        }

                        // Aggressive Name Scrubbing
                        let cleanName = namePart
                            .replace(/\(Display Commander\)/gi, '')
                            .replace(/Thick Stock/gi, '')
                            .replace(/\s*\(.*?\)/g, '')
                            .replace(/\s*-\s*(Full Art|Showcase|Borderless|Textured|Extended|Etched|Retro)/gi, '')
                            .trim();

                        // Fix for "Dogmeat, Ever Loyal -" (Trailing dash removal)
                        if (cleanName.endsWith('-')) {
                            cleanName = cleanName.slice(0, -1).trim();
                        }

                        let colNum = '';
                        const allDigits = (namePart + " " + extraPart).match(/\b\d{1,4}\b/g);
                        if (allDigits) {
                            colNum = allDigits[allDigits.length - 1].replace(/^0+/, '');
                        }

                        if (this.mode === 'csv') {
                            const quotedName = `"${cleanName.replace(/"/g, '""')}"`;
                            results.push(`${count},${quotedName},${specificSet},Near Mint,English,${isFoil ? 'foil' : ''},${colNum}`);
                        } else {
                            // Decklist Formatting
                            if (specificSet === 'LIST') {
                                results.push(`${count} ${cleanName}${isFoil ? ' *F*' : ''}`);
                            } else {
                                let lineResult = `${count} ${cleanName} (${specificSet}) ${colNum}`;
                                if (isFoil) lineResult += " *F*";
                                results.push(lineResult);
                            }
                        }
                    });

                    this.output = results.join('\n');
                },

                copyToClipboard() {
                    const el = document.getElementById('outputArea');
                    el.select();
                    document.execCommand('copy');
                    alert('Decklist copied to clipboard!');
                },

                downloadCSV() {
                    const blob = new Blob([this.output], { type: 'text/csv;charset=utf-8;' });
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(blob);
                    link.setAttribute("download", "forge_collection_import.csv");
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }
            }
        }
    </script>
</body>
</html>
