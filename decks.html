<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>FORGE // TACTICAL BUILDER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gunmetal: #111c1e; --dark: #1a2527; --cyan: #22d3ee; --steel: #8fa9b0; --warn: #eb5f7a; --ok: #4ade80; }
        
        /* CUSTOM HUD CURSOR (Sidebar Only) */
        .sidebar-active { cursor: none !important; }
        #custom-cursor {
            width: 16px; height: 16px; border: 1px solid var(--cyan); border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 9999;
            transition: transform 0.1s ease-out, background 0.2s;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 8px rgba(34, 211, 238, 0.3);
            display: none; 
        }
        .sidebar-active #custom-cursor { display: block; }
        #custom-cursor::after {
            content: ''; width: 2px; height: 2px; background: var(--cyan);
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border-radius: 50%;
        }
        .cursor-hover #custom-cursor { transform: translate(-50%, -50%) scale(1.4); background: rgba(34, 211, 238, 0.15); }

        body { background: var(--gunmetal); color: #e8eef0; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        .panel { background: var(--dark); border: 1px solid rgba(34, 211, 238, 0.1); }
        .btn-primary { border: 1px solid var(--cyan); color: var(--cyan); padding: 0.5rem; text-transform: uppercase; font-weight: 700; clip-path: polygon(0 0, 92% 0, 100% 25%, 100% 100%, 8% 100%, 0 75%); transition: 0.2s; }
        .btn-primary:hover { background: var(--cyan); color: black; }
        
        .card-preview-float { position: fixed; z-index: 3000; width: 240px; pointer-events: none; border-radius: 12px; border: 1px solid rgba(34, 211, 238, 0.3); }
        .category-header { font-family: 'Bebas Neue'; letter-spacing: 1px; color: var(--steel); border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 12px; padding-bottom: 2px; }
        .scroll-v { overflow-y: auto; height: calc(100vh - 280px); scrollbar-width: thin; scrollbar-color: var(--cyan) transparent; }
        .brand-blue { color: rgb(34, 211, 238); }
        
        .hud-counter { 
            font-family: 'monospace'; font-size: 8px; letter-spacing: 1px; 
            color: rgba(143, 169, 176, 0.4); background: rgba(255, 255, 255, 0.03); 
            padding: 4px 10px; border-radius: 2px;
        }
        .hud-counter.deficit { background: rgba(235, 95, 122, 0.1); color: var(--warn); border: 1px solid rgba(235, 95, 122, 0.2); }
        .status-icon { font-size: 10px; width: 14px; font-weight: bold; }
        .btn-cmdr { font-size: 8px; font-weight: 900; padding: 2px 4px; border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); }
        .btn-cmdr.active { border-color: var(--cyan); color: var(--cyan); background: rgba(34, 211, 238, 0.1); }

        .dragging { opacity: 0.4; border: 1px dashed var(--cyan); }
        .drag-over { border-top: 2px solid var(--cyan); }

        /* FIXED SEARCH RESULTS (Prevents Clipping) */
        .search-results-container {
            position: fixed; 
            background: rgba(17, 28, 30, 0.98); border: 1px solid rgba(34, 211, 238, 0.4);
            z-index: 5000; margin-top: 5px; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            backdrop-filter: blur(15px); max-height: 400px; overflow-y: auto;
        }
    </style>
</head>
<body x-data="deckApp()" x-init="init()" @mousemove="moveCursor($event)" :class="{'sidebar-active': inSidebar, 'cursor-hover': isHovering}">
    
    <div id="custom-cursor"></div>
    <img x-show="hoverPreview.visible && viewMode === 'list'" :src="hoverPreview.url" class="card-preview-float shadow-2xl" :style="`left:${hoverPreview.x+20}px; top:${hoverPreview.y-120}px`" />

    <header class="panel px-6 py-4 flex justify-between items-center border-b border-cyan-400/20">
        <div class="flex items-center gap-6">
            <a href="index.html" class="text-3xl font-bold brand-blue" style="font-family: 'Bebas Neue'">FORGE // DECKS</a>
            <nav class="flex gap-4 text-[10px] font-bold uppercase tracking-widest text-steel">
                <a href="collection.html" class="hover:brand-blue transition">Vault</a>
                <a href="import.html" class="hover:brand-blue transition">Uplink</a>
            </nav>
        </div>
        <div class="flex gap-2">
            <button @click="viewMode = 'list'" :class="viewMode === 'list' ? 'bg-cyan-400 text-black' : 'bg-white/5'" class="px-3 py-1 text-[10px] font-bold uppercase">List</button>
            <button @click="viewMode = 'visual'" :class="viewMode === 'visual' ? 'bg-cyan-400 text-black' : 'bg-white/5'" class="px-3 py-1 text-[10px] font-bold uppercase">Visual</button>
        </div>
    </header>

    <main class="grid grid-cols-12 gap-4 p-4 h-[calc(100vh-80px)]">
        <div class="col-span-2 panel p-4 flex flex-col" 
             @mouseenter="inSidebar = true" 
             @mouseleave="inSidebar = false; isHovering = false">
            <button @click="createNewDeck()" @mouseenter="isHovering = true" @mouseleave="isHovering = false" class="w-full btn-primary text-xs mb-6">+ Initialise List</button>
            <div class="flex-1 overflow-y-auto" @dragover.prevent @drop="handleDrop()">
                <template x-for="(deck, index) in decks" :key="deck.id">
                    <div class="group relative mb-2" draggable="true" @dragstart="handleDragStart(index)" @dragover.prevent="dragOverIndex = index" @dragleave="dragOverIndex = null" :class="{ 'dragging': dragSrcIndex === index, 'drag-over': dragOverIndex === index }">
                        <div @click="activeDeck = deck" @mouseenter="isHovering = true" @mouseleave="isHovering = false" :class="activeDeck?.id === deck.id ? 'border-cyan-400 bg-cyan-400/5' : 'border-transparent opacity-60'" class="p-3 border-l-2 transition hover:opacity-100">
                            <div x-text="deck.name" class="font-bold text-sm uppercase truncate pr-8"></div>
                            <div class="text-[9px] font-mono brand-blue" x-text="countAllCards(deck) + ' UNITS'"></div>
                        </div>
                        <button @click.stop="deleteDeck(deck.id)" @mouseenter="isHovering = true" @mouseleave="isHovering = false" class="absolute top-4 right-2 text-[8px] font-black text-red-500 opacity-0 group-hover:opacity-100 transition-opacity hover:underline">PURGE</button>
                    </div>
                </template>
            </div>
        </div>

        <div class="col-span-10 flex flex-col gap-4" x-show="activeDeck">
            <div class="panel p-6 grid grid-cols-3 items-center gap-4 relative overflow-hidden">
                <div class="absolute top-[-20px] right-1/2 translate-x-1/2 opacity-5 font-mono text-[120px] leading-none select-none brand-blue" x-text="countAllCards(activeDeck)"></div>
                <div><h2 class="text-4xl font-bold uppercase italic truncate" x-text="activeDeck.name"></h2></div>
                <div class="flex flex-col items-center justify-center border-x border-white/5 h-full z-10">
                    <p class="text-[10px] text-steel uppercase tracking-[0.3em] mb-1">Combat Readiness</p>
                    <div class="flex gap-6 font-mono text-sm brand-blue font-bold">
                        <span>COUNT: <span x-text="countAllCards(activeDeck)"></span></span>
                        <span>VALUE: <span class="text-white">$<span x-text="getDeckPrice()"></span></span></span>
                    </div>
                </div>
                <div class="z-10 flex flex-col items-end gap-2 relative" x-ref="searchWrapper">
                    <input type="text" x-model="searchQuery" @input.debounce.500ms="searchCards()" placeholder="QUERY DATABASE..." class="w-full max-w-[280px] bg-black/40 border border-cyan-400/20 p-2 text-xs font-mono focus:border-cyan-400 outline-none">
                    
                    <div x-show="searchResults.length > 0 && searchQuery.length > 0" 
                         @click.away="searchResults = []" 
                         class="search-results-container"
                         :style="`top: ${$refs.searchWrapper.getBoundingClientRect().bottom}px; left: ${$refs.searchWrapper.getBoundingClientRect().left}px; width: ${$refs.searchWrapper.offsetWidth}px;`"
                         x-transition>
                        <template x-for="res in searchResults" :key="res.id">
                            <div @click="addCardToDeck(res)" class="p-2 border-b border-white/5 flex items-center gap-3 cursor-pointer hover:bg-cyan-400/10 group transition-all">
                                <img :src="res.image_uris?.small" class="w-8 h-11 rounded-sm shadow-md">
                                <div class="flex-1 overflow-hidden text-left">
                                    <p class="text-[10px] font-bold truncate group-hover:text-cyan-400" x-text="res.name"></p>
                                    <p class="text-[8px] text-steel truncate font-mono uppercase" x-text="res.type_line"></p>
                                </div>
                                <span class="text-cyan-400 text-xs font-bold opacity-0 group-hover:opacity-100 pr-2">+</span>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-12 gap-4 flex-1 overflow-hidden">
                <div class="col-span-12 scroll-v pr-2">
                    <template x-for="cat in categories" :key="cat">
                        <div x-show="getCardsByCat(cat).length > 0" class="mb-8">
                            <h3 class="category-header text-sm flex justify-between">
                                <span x-text="cat"></span>
                                <span class="opacity-40" x-text="getCardsByCat(cat).reduce((a, b) => a + b.qty, 0)"></span>
                            </h3>
                            
                            <div x-show="viewMode === 'list'" class="grid grid-cols-1 gap-1">
                                <template x-for="card in getCardsByCat(cat)" :key="card.id">
                                    <div class="flex justify-between items-center py-1.5 hover:bg-white/[0.02] px-2 group rounded border-b border-white/[0.02]">
                                        <div class="flex items-center gap-3 truncate">
                                            <span class="status-icon" :class="getStatusColor(card)" x-text="getStatusIcon(card)"></span>
                                            <div class="flex items-center gap-3">
                                                <span @mouseenter="showPreview($event, card.image_uris?.normal)" @mouseleave="hidePreview()" x-text="card.name" class="text-xs font-bold truncate group-hover:brand-blue transition-colors"></span>
                                                <button x-show="isCreature(card)" @click="setCommander(card)" class="btn-cmdr uppercase tracking-tighter" :class="card.isCommander ? 'active' : ''" x-text="card.isCommander ? 'CMDR ACTIVE' : 'SET CMDR'"></button>
                                            </div>
                                            <button @click="removeCompletely(card)" class="opacity-0 group-hover:opacity-100 transition-opacity text-[8px] bg-red-900/20 text-red-400 px-1 hover:bg-red-500 hover:text-white uppercase font-bold">Delete</button>
                                        </div>
                                        <div class="flex items-center gap-4">
                                            <div class="hud-counter flex gap-2 items-center" :class="getUsageStats(card.name).avail < 0 ? 'deficit' : ''">
                                                <span><span x-text="getUsageStats(card.name).deckCount"></span> DECKS</span>
                                                <span class="opacity-20">|</span>
                                                <span><span x-text="getUsageStats(card.name).avail"></span> AVAIL</span>
                                            </div>
                                            <div class="flex items-center bg-black/40 rounded border border-white/5">
                                                <button @click="adjustQty(card, -1)" class="px-3 py-1 text-steel hover:brand-blue">-</button>
                                                <span class="text-[10px] font-mono w-6 text-center border-x border-white/5" x-text="card.qty"></span>
                                                <button @click="adjustQty(card, 1)" class="px-3 py-1 text-steel hover:brand-blue">+</button>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>

                            <div x-show="viewMode === 'visual'" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
                                <template x-for="card in getCardsByCat(cat)" :key="card.id">
                                    <div class="relative group">
                                        <img :src="card.image_uris?.normal" class="rounded-xl w-full border border-white/10 group-hover:border-cyan-400/50 transition-all duration-300 shadow-2xl group-hover:scale-105">
                                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity rounded-xl flex flex-col justify-end p-3 gap-2">
                                            <div class="flex justify-between items-center">
                                                <span class="status-icon" :class="getStatusColor(card)" x-text="getStatusIcon(card)"></span>
                                                <div class="hud-counter text-[7px]" :class="getUsageStats(card.name).avail < 0 ? 'deficit' : ''">
                                                    <span x-text="getUsageStats(card.name).avail"></span> AVAIL
                                                </div>
                                            </div>
                                            <div class="flex justify-center bg-black/60 rounded border border-white/10 overflow-hidden">
                                                <button @click="adjustQty(card, -1)" class="flex-1 py-1 hover:bg-cyan-400 hover:text-black">-</button>
                                                <span class="px-3 py-1 font-mono text-xs border-x border-white/10" x-text="card.qty"></span>
                                                <button @click="adjustQty(card, 1)" class="flex-1 py-1 hover:bg-cyan-400 hover:text-black">+</button>
                                            </div>
                                        </div>
                                        <div x-show="card.isCommander" class="absolute -top-2 -right-2 bg-yellow-400 text-black text-[8px] font-black px-2 py-1 rounded skew-x-[-10deg] shadow-lg">COMMANDER</div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </main>

    <script>
        function deckApp() {
            return {
                decks: JSON.parse(localStorage.getItem('decks') || '[]'),
                vault: JSON.parse(localStorage.getItem('forge_vault') || '[]'),
                activeDeck: null, searchQuery: '', searchResults: [], viewMode: 'list',
                categories: ['Commander', 'Creature', 'Sorcery', 'Instant', 'Artifact', 'Enchantment', 'Planeswalker', 'Land'],
                hoverPreview: { visible: false, url: '', x: 0, y: 0 },
                dragSrcIndex: null, dragOverIndex: null, 
                inSidebar: false, isHovering: false,

                init() { if(this.decks.length) this.activeDeck = this.decks[0]; },
                
                moveCursor(e) {
                    if(!this.inSidebar) return;
                    const cursor = document.getElementById('custom-cursor');
                    cursor.style.left = e.clientX + 'px';
                    cursor.style.top = e.clientY + 'px';
                },

                handleDragStart(index) { this.dragSrcIndex = index; },
                handleDrop() {
                    if (this.dragSrcIndex !== null && this.dragOverIndex !== null) {
                        const item = this.decks.splice(this.dragSrcIndex, 1)[0];
                        this.decks.splice(this.dragOverIndex, 0, item);
                        this.save();
                    }
                    this.dragSrcIndex = null; this.dragOverIndex = null;
                },

                deleteDeck(id) {
                    if(confirm("PERMANENTLY PURGE THIS DATASET?")) {
                        this.decks = this.decks.filter(d => d.id !== id);
                        if(this.activeDeck?.id === id) this.activeDeck = this.decks[0] || null;
                        this.save();
                    }
                },

                clean(n) {
                    if(!n) return "";
                    const basics = ['forest', 'island', 'swamp', 'mountain', 'plains'];
                    let name = n.split('(')[0].split('[')[0].split(' // ')[0].replace(/[^\w\s]/gi, '').toLowerCase().trim();
                    const b = basics.find(x => name.includes(x));
                    return b ? b : name;
                },

                isCreature(card) { return card.type_line?.toLowerCase().includes('creature'); },

                getUsageStats(name) {
                    const target = this.clean(name);
                    const total = this.vault.reduce((s, v) => this.clean(v.name) === target ? s + v.qty : s, 0);
                    let totalUsed = 0, deckCount = 0;
                    this.decks.forEach(d => {
                        const c = d.cards.find(x => this.clean(x.name) === target);
                        if (c) { deckCount++; totalUsed += c.qty; }
                    });
                    return { totalOwned: total, deckCount, avail: total - totalUsed };
                },

                getStatusIcon(card) {
                    const s = this.getUsageStats(card.name);
                    return s.totalOwned === 0 ? '✕' : (s.avail < 0 ? '!' : '✓');
                },

                getStatusColor(card) {
                    const s = this.getUsageStats(card.name);
                    return s.totalOwned === 0 ? 'text-red-500' : (s.avail < 0 ? 'text-cyan-400' : 'text-green-400');
                },

                setCommander(card) {
                    if (!this.isCreature(card)) return;
                    this.activeDeck.cards.forEach(c => c.isCommander = false);
                    card.isCommander = true; this.save();
                },

                getDeckPrice() {
                    if(!this.activeDeck?.cards) return '0.00';
                    return this.activeDeck.cards.reduce((s, c) => s + (parseFloat(c.prices?.usd || 0) * c.qty), 0).toFixed(2);
                },

                async searchCards() {
                    if(this.searchQuery.length < 2) {
                        this.searchResults = [];
                        return;
                    }
                    const res = await fetch(`https://api.scryfall.com/cards/search?q=${encodeURIComponent(this.searchQuery)}`);
                    const d = await res.json();
                    this.searchResults = d.data?.slice(0, 10) || [];
                },

                addCardToDeck(res) {
                    if(!this.activeDeck) return;
                    const existing = this.activeDeck.cards.find(c => c.id === res.id);
                    if(existing) {
                        existing.qty++;
                    } else {
                        this.activeDeck.cards.push({
                            id: res.id,
                            name: res.name,
                            qty: 1,
                            type_line: res.type_line,
                            image_uris: res.image_uris,
                            prices: res.prices,
                            isCommander: false
                        });
                    }
                    this.searchQuery = '';
                    this.searchResults = [];
                    this.save();
                },

                adjustQty(card, v) {
                    card.qty += v; if(card.qty <= 0) this.removeCompletely(card);
                    this.save();
                },

                removeCompletely(c) { this.activeDeck.cards = this.activeDeck.cards.filter(x => x.id !== c.id); this.save(); },

                getCardsByCat(cat) {
                    if(!this.activeDeck?.cards) return [];
                    return this.activeDeck.cards.filter(c => {
                        if(cat === 'Commander') return c.isCommander;
                        return !c.isCommander && c.type_line.includes(cat);
                    });
                },

                countAllCards(d) { return d?.cards?.reduce((s, c) => s + c.qty, 0) || 0; },
                save() { localStorage.setItem('decks', JSON.stringify(this.decks)); },
                showPreview(e, url) { this.hoverPreview = { visible: true, url, x: e.clientX, y: e.clientY }; },
                hidePreview() { this.hoverPreview.visible = false; },
                createNewDeck() {
                    const n = prompt("Terminal ID:");
                    if(n) { 
                        const d = {id: Date.now(), name: n, cards: [], sideboard: []};
                        this.decks.push(d); this.activeDeck = d; this.save(); 
                    }
                }
            }
        }
    </script>
</body>
</html>
