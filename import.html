<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>FORGE // UPLINK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gunmetal: #111c1e; --dark: #1a2527; --cyan: #22d3ee; --steel: #8fa9b0; --red: #ef4444; }
        body { background: var(--gunmetal); color: #e8eef0; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        .panel { background: var(--dark); border: 1px solid rgba(34, 211, 238, 0.1); }
        .brand-blue { color: rgb(34, 211, 238); }
        .btn-primary { border: 1px solid var(--cyan); color: var(--cyan); padding: 0.8rem; text-transform: uppercase; font-weight: 700; clip-path: polygon(0 0, 95% 0, 100% 25%, 100% 100%, 5% 100%, 0 75%); transition: 0.2s; cursor: pointer; }
        .btn-primary:hover { background: var(--cyan); color: black; }
        
        .btn-danger { border: 1px solid var(--red); color: var(--red); padding: 0.8rem; text-transform: uppercase; font-weight: 700; clip-path: polygon(0 0, 95% 0, 100% 25%, 100% 100%, 5% 100%, 0 75%); transition: 0.2s; cursor: pointer; }
        .btn-danger:hover { background: var(--red); color: white; }

        .modal-bg { background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
        textarea::placeholder { color: rgba(34, 211, 238, 0.1); }
    </style>
</head>
<body x-data="importApp()">

    <div x-show="showConfirm" class="fixed inset-0 z-[5000] modal-bg flex items-center justify-center p-6" x-transition>
        <div class="panel w-full max-w-lg p-8 border-t-4 border-t-cyan-400">
            <h3 class="text-2xl font-bold italic brand-blue mb-2">INGESTION PROTOCOL</h3>
            <p class="text-xs text-steel uppercase tracking-widest mb-8">Select handling method for incoming data streams.</p>
            
            <div class="grid grid-cols-2 gap-4">
                <button @click="executeIngest(true)" class="btn-danger text-xs">
                    Overwrite<br><span class="text-[9px] opacity-60">Purge Vault</span>
                </button>
                <button @click="executeIngest(false)" class="btn-primary text-xs">
                    Merge<br><span class="text-[9px] opacity-60">Combine Data</span>
                </button>
            </div>
            
            <button @click="showConfirm = false" class="w-full mt-6 text-[10px] text-steel hover:text-white uppercase font-bold tracking-widest">Abort Command</button>
        </div>
    </div>

    <header class="panel px-6 py-4 flex justify-between items-center border-b border-cyan-400/20 shadow-xl">
        <div class="flex items-center gap-6">
            <a href="index.html" class="text-3xl font-bold brand-blue" style="font-family: 'Bebas Neue'">FORGE // UPLINK</a>
            <nav class="flex gap-4 text-[10px] font-bold uppercase tracking-widest text-steel">
                <a href="collection.html" class="hover:brand-blue transition">Vault</a>
                <a href="decks.html" class="hover:brand-blue transition">Decks</a>
            </nav>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-12 h-[calc(100vh-80px)]">
        <div class="panel p-8 flex flex-col gap-6 h-full">
            <div class="flex justify-between items-end">
                <div>
                    <h2 class="text-2xl font-bold italic tracking-tighter brand-blue uppercase leading-none">Bulk Inventory Ingest</h2>
                    <p class="text-[10px] text-steel uppercase tracking-[0.2em] mt-2">Neural link established // Awaiting data</p>
                </div>
            </div>
            
            <textarea x-model="rawInput" 
                      class="flex-1 bg-black/40 border border-white/10 p-6 font-mono text-xs focus:border-cyan-400 outline-none text-cyan-100 resize-none" 
                      placeholder="1 Quill-Blade Laureate [SOS] 27..."></textarea>
            
            <div class="flex justify-end items-center border-t border-white/5 pt-6">
                <div class="flex items-center gap-4">
                    <div x-show="processing" class="text-[10px] italic animate-pulse brand-blue uppercase tracking-widest">Writing to Vault...</div>
                    <button @click="showConfirm = true" :disabled="processing || !rawInput.trim()" class="btn-primary px-12">Initialise Ingest</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        function importApp() {
            return {
                rawInput: '', 
                processing: false,
                showConfirm: false,
                
                async executeIngest(overwrite) {
                    this.showConfirm = false;
                    this.processing = true;
                    
                    const lines = this.rawInput.split('\n');
                    let vault = overwrite ? [] : JSON.parse(localStorage.getItem('forge_vault') || '[]');

                    for (let line of lines) {
                        if (!line.trim()) continue;

                        // Precise Parser: Qty, Name, Set, Number
                        const match = line.match(/^(\d+)\s+([^\[\(]+)(?:\s*[\(\[].*?[\)\]])?\s*\[(.*?)\]\s*(\d+)?/);
                        let qty, name, set, num;

                        if (match) {
                            qty = parseInt(match[1]);
                            name = match[2].trim();
                            set = match[3].trim().toLowerCase();
                            num = match[4] ? match[4].trim() : null;
                        } else {
                            const simpleMatch = line.match(/^(\d+)\s+(.+)$/);
                            if (simpleMatch) {
                                qty = parseInt(simpleMatch[1]);
                                name = simpleMatch[2].trim();
                            }
                        }

                        if (name) {
                            let existing = vault.find(c => 
                                c.name.toLowerCase() === name.toLowerCase() && 
                                (c.set === set) && 
                                (c.collector_number === num)
                            );

                            if (existing) {
                                existing.qty += qty;
                            } else {
                                // Background fetch for type data
                                try {
                                    const res = await fetch(`https://api.scryfall.com/cards/named?exact=${encodeURIComponent(name)}`);
                                    const data = await res.json();
                                    vault.push({ 
                                        name, qty, 
                                        set: set || data.set, 
                                        collector_number: num || data.collector_number,
                                        type: data.type_line || 'Unit'
                                    });
                                } catch(e) {
                                    vault.push({ name, qty, set, collector_number: num, type: 'Unit' });
                                }
                            }
                        }
                    }

                    localStorage.setItem('forge_vault', JSON.stringify(vault));
                    this.rawInput = '';
                    this.processing = false;
                    alert(overwrite ? "VAULT RECONSTRUCTED FROM SOURCE." : "VAULT DATA MERGED.");
                }
            }
        }
    </script>
</body>
</html>
