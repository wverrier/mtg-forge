<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORGE // MOXFIELD UPLINK NEW</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gunmetal: #111c1e; --dark: #1a2527; --cyan: #4dd9f0; }
        body { background: var(--gunmetal); color: #e8eef0; font-family: 'Rajdhani', sans-serif; min-height: 100vh; }
        .panel { background: var(--dark); border: 1px solid rgba(77,217,240,0.1); }
        textarea { background: rgba(0,0,0,0.3) !important; border: 1px solid rgba(77,217,240,0.2) !important; color: #4dd9f0 !important; font-family: monospace; }
        .btn-primary { background: transparent; border: 1px solid var(--cyan); color: var(--cyan); font-family: 'Bebas Neue'; transition: 0.2s; }
        .btn-primary:hover { background: var(--cyan); color: var(--gunmetal); box-shadow: 0 0 15px var(--cyan); }
    </style>
</head>
<body x-data="moxfieldTranslator()">

    <div class="max-w-4xl mx-auto py-12 px-6">
        <header class="mb-12 border-b border-cyan-400/20 pb-6 flex justify-between items-end">
            <div>
                <h1 class="text-5xl font-bold text-cyan-400 italic" style="font-family: 'Bebas Neue'">MOXFIELD // COLLECTION UPLINK</h1>
                <p class="text-slate-400 text-sm tracking-widest uppercase">Specialized Parser: [LIST] & Full-Art Support</p>
            </div>
            <a href="index.html" class="text-xs text-cyan-400 hover:underline mb-2 tracking-tighter">← SYSTEM TERMINAL</a>
        </header>

        <div class="grid gap-8">
            <div class="panel p-6">
                <label class="block text-xs font-bold text-cyan-400 mb-2 uppercase tracking-tighter">Raw Data Input</label>
                <textarea x-model="rawInput" rows="10" class="w-full p-4 rounded focus:outline-none focus:border-cyan-400" 
                    placeholder="Paste your list here..."></textarea>
            </div>

            <div class="flex justify-center">
                <button @click="processData()" class="btn-primary px-12 py-3 text-xl uppercase italic">Clean & Format for CSV</button>
            </div>

            <div class="panel p-6" x-show="csvOutput">
                <div class="flex justify-between items-center mb-2">
                    <label class="text-xs font-bold text-cyan-400 uppercase tracking-tighter">CSV Output</label>
                    <button @click="downloadCSV()" class="text-[10px] text-white bg-white/10 px-2 py-1 hover:bg-cyan-400 hover:text-black transition">Download .CSV</button>
                </div>
                <textarea x-model="csvOutput" readonly rows="10" class="w-full p-4 rounded opacity-80 text-sm"></textarea>
            </div>
        </div>
    </div>

    <script>
        function moxfieldTranslator() {
            return {
                rawInput: '',
                csvOutput: '',
                
                processData() {
                    if (!this.rawInput.trim()) return;

                    const lines = this.rawInput.split('\n');
                    let csvRows = ['Count,Name,Edition,Condition,Language,Foil,Collector Number'];
                    
                    lines.forEach(line => {
                        const trimmedLine = line.trim();
                        if (!trimmedLine) return;

                        // Regex to grab Count and separate the rest
                        const countMatch = trimmedLine.match(/^(\d+)\s+/);
                        if (!countMatch) return;
                        
                        const count = countMatch[1];
                        let remainder = trimmedLine.substring(countMatch[0].length).trim();

                        // Grab the Set Code [XXX]
                        const setMatch = remainder.match(/\[(.*?)\]/);
                        if (!setMatch) return;

                        let set = setMatch[1].trim();
                        const setIndex = remainder.indexOf(setMatch[0]);
                        let namePart = remainder.substring(0, setIndex).trim();
                        let extraPart = remainder.substring(setIndex + setMatch[0].length).trim();

                        // --- SCRUBBING ENGINE ---

                        // 1. Resolve [LIST] redirects (e.g. Arcane Signet (MKC) [LIST])
                        const listCheck = namePart.match(/\((.*?)\)/);
                        if (set === 'LIST' && listCheck) {
                            set = listCheck[1]; // Use the inner set code (MKC) instead of LIST
                        }

                        // 2. Resolve Double-Names/Reskins (e.g. Basim - Ramses)
                        if (namePart.includes(" - ")) {
                            // If it's a reskin, the second half is usually the actual card name
                            const parts = namePart.split(" - ");
                            const possibleSuffixes = ['full art', 'showcase', 'borderless'];
                            const lastPartLower = parts[parts.length - 1].toLowerCase();
                            
                            // Only split if it's not a flavor suffix like "Full Art"
                            if (!possibleSuffixes.some(s => lastPartLower.includes(s))) {
                                namePart = parts[parts.length - 1];
                            }
                        }

                        // 3. Clean Name: Remove (Parenthesis) and common suffixes
                        let cleanName = namePart
                            .replace(/\s*\(.*?\)/g, '')   
                            .replace(/\s*-\s*Full Art/i, '')
                            .replace(/\s*-\s*Showcase/i, '')
                            .replace(/\s*-\s*Borderless/i, '')
                            .trim();

                        // 4. Collector Number & Foil Detection
                        let collectorNum = '';
                        let isFoil = /foil/i.test(extraPart + namePart) ? 'foil' : '';

                        // Look for digits in the name or extra part (3 or 4 digits usually)
                        const allDigits = (namePart + " " + extraPart).match(/\b\d{1,4}\b/g);
                        if (allDigits) {
                            // Take the last set of digits found as the collector number
                            collectorNum = allDigits[allDigits.length - 1];
                        }

                        const finalName = `"${cleanName.replace(/"/g, '""')}"`;
                        csvRows.push(`${count},${finalName},${set},Near Mint,English,${isFoil},${collectorNum}`);
                    });

                    this.csvOutput = csvRows.join('\n');
                },

                downloadCSV() {
                    const blob = new Blob([this.csvOutput], { type: 'text/csv;charset=utf-8;' });
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(blob);
                    link.setAttribute("download", "forge_moxfield_export.csv");
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }
            }
        }
    </script>
</body>
</html>
