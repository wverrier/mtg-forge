<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>FORGE // TACTICAL BUILDER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gunmetal: #111c1e; --dark: #1a2527; --cyan: #22d3ee; --steel: #8fa9b0; --warn: #eb5f7a; --ok: #4ade80; }
        
        /* [Global Styles Omitted for Brevity - Keeping consistent with previous version] */
        body { background: var(--gunmetal); color: #e8eef0; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        .panel { background: var(--dark); border: 1px solid rgba(34, 211, 238, 0.1); }
        .btn-primary { border: 1px solid var(--cyan); color: var(--cyan); padding: 0.5rem; text-transform: uppercase; font-weight: 700; clip-path: polygon(0 0, 92% 0, 100% 25%, 100% 100%, 8% 100%, 0 75%); transition: 0.2s; }
        .brand-blue { color: rgb(34, 211, 238); }
        .category-header { font-family: 'Bebas Neue'; letter-spacing: 2px; color: var(--steel); border-bottom: 1px solid rgba(34, 211, 238, 0.2); margin-bottom: 16px; padding-bottom: 4px; text-transform: uppercase; }
        .scroll-v { overflow-y: auto; height: calc(100vh - 280px); scrollbar-width: thin; scrollbar-color: var(--cyan) transparent; }

        /* HUD & STATUS ELEMENTS */
        .hud-block { font-family: 'Bebas Neue'; padding: 3px 10px; font-size: 10px; border-radius: 4px; letter-spacing: 1px; transition: 0.2s; border: 1px solid rgba(255, 255, 255, 0.1); }
        .avail-counter { background: rgba(255, 255, 255, 0.05); color: var(--steel); }
        .avail-counter.deficit { background: rgba(235, 95, 122, 0.2); color: var(--warn); border-color: rgba(235, 95, 122, 0.3); }
        .avail-counter.ok { color: var(--cyan); border-color: rgba(34, 211, 238, 0.2); }
        .cmdr-inactive { background: rgba(255, 255, 255, 0.05); color: rgba(255, 255, 255, 0.4); }
        .cmdr-active { background: var(--cyan); color: black; border-color: var(--cyan); box-shadow: 0 0 10px rgba(34, 211, 238, 0.3); }

        /* VISUAL GRID TUNING */
        .visual-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 24px; }
        .visual-card-wrapper { position: relative; transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .visual-card-wrapper:hover { transform: translateY(-5px); z-index: 50; }
        
        .visual-card { width: 100%; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); transition: filter 0.3s ease; }
        .visual-card-wrapper:hover .visual-card { filter: blur(2px) brightness(0.6); }
        .visual-card.is-cmdr { border: 2px solid var(--cyan); box-shadow: 0 0 15px rgba(34, 211, 238, 0.3); }

        /* UNIT BANNER - HIGHEST PRIORITY */
        .unit-banner { position: absolute; top: 8px; left: 8px; z-index: 100; pointer-events: none; }

        /* HOVER CONTROLS */
        .card-controls { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 24px; opacity: 0; transition: opacity 0.2s ease; z-index: 60; }
        .visual-card-wrapper:hover .card-controls { opacity: 1; }
        
        .qty-btn { background: rgba(0,0,0,0.8); border: 1px solid rgba(34, 211, 238, 0.4); width: 32px; height: 32px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-family: 'monospace'; font-weight: bold; transition: 0.2s; }
        .qty-btn:hover { background: var(--cyan); color: black; border-color: var(--cyan); }

        .import-banner { position: fixed; bottom: 0; right: 20px; width: 400px; z-index: 4000; border: 1px solid rgba(34, 211, 238, 0.3); background: rgba(17, 28, 30, 0.95); backdrop-filter: blur(10px); transition: transform 0.3s; }
        .import-banner.collapsed { transform: translateY(calc(100% - 32px)); }
        .banner-header { height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; background: rgba(34, 211, 238, 0.05); }
    </style>
</head>
<body x-data="deckApp()" x-init="init()">
    
    <header class="panel px-6 py-4 flex justify-between items-center border-b border-cyan-400/20">
        <div class="flex items-center gap-8">
            <a href="index.html" class="text-3xl font-bold brand-blue" style="font-family: 'Bebas Neue'">FORGE // DECKS</a>
            <div class="flex gap-2">
                <button @click="viewMode = 'list'" :class="viewMode === 'list' ? 'bg-cyan-400 text-black' : 'bg-white/5 text-steel'" class="px-4 py-1.5 text-[10px] font-bold uppercase">List</button>
                <button @click="viewMode = 'visual'" :class="viewMode === 'visual' ? 'bg-cyan-400 text-black' : 'bg-white/5 text-steel'" class="px-4 py-1.5 text-[10px] font-bold uppercase">Visual</button>
            </div>
        </div>
    </header>

    <main class="p-4" x-show="activeDeck">
        <div class="scroll-v pr-2">
            <template x-if="viewMode === 'visual'">
                <div>
                    <template x-for="cat in categories" :key="cat">
                        <div x-show="getCardsByCat(cat).length > 0" class="mb-10">
                            <h3 class="category-header text-xs mb-4" x-text="cat"></h3>
                            <div class="visual-grid">
                                <template x-for="card in getCardsByCat(cat)" :key="card.id">
                                    <div class="visual-card-wrapper">
                                        <div class="unit-banner flex flex-col gap-1">
                                            <div class="hud-block avail-counter text-[9px]" :class="getUsageStats(card.name).avail < 0 ? 'deficit' : 'ok'" x-text="getUsageStats(card.name).avail + ' AVAIL'"></div>
                                            <div class="hud-block bg-cyan-400 text-black font-black border-none text-[9px]" x-text="card.qty + ' UNITS'"></div>
                                        </div>

                                        <img :src="card.image_uris?.normal" class="visual-card" :class="card.isCommander ? 'is-cmdr' : ''">
                                        
                                        <div x-show="card.isCommander" class="absolute bottom-20 left-0 right-0 flex justify-center z-20">
                                            <div class="hud-block cmdr-active">CMDR</div>
                                        </div>

                                        <div class="card-controls">
                                            <div class="flex gap-3 mb-4">
                                                <button @click="adjustQty(card, -1)" class="qty-btn">-</button>
                                                <button @click="adjustQty(card, 1)" class="qty-btn">+</button>
                                            </div>
                                            <button x-show="!card.isCommander && (card.type_line.includes('Creature') || card.type_line.includes('Planeswalker'))" 
                                                    @click="setCommander(card)" 
                                                    class="hud-block cmdr-inactive text-[9px]">SET CMDR</button>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </main>

    <div class="import-banner" :class="terminalOpen ? '' : 'collapsed'" x-show="activeDeck" x-data="{ terminalOpen: false, rawList: '', isProcessing: false }">
        <div class="banner-header" @click="terminalOpen = !terminalOpen">
            <span class="text-[10px] font-black tracking-widest brand-blue flex items-center gap-2">▲ BULK UPLINK TERMINAL</span>
        </div>
        <div class="p-4">
            <textarea x-model="rawList" class="w-full h-32 bg-black/40 border border-cyan-400/20 p-2 text-[10px] font-mono text-cyan-200"></textarea>
            <button @click="$parent.processImport($data)" class="w-full btn-primary mt-2 text-[10px]">INTEGRATE UNITS</button>
        </div>
    </div>

    <script>
        // Use logic from previous script block
        function deckApp() {
            return {
                decks: JSON.parse(localStorage.getItem('decks') || '[]'),
                vault: JSON.parse(localStorage.getItem('forge_vault') || '[]'),
                activeDeck: null, viewMode: 'visual',
                categories: ['Commander', 'Creature', 'Sorcery', 'Instant', 'Artifact', 'Enchantment', 'Planeswalker', 'Land'],
                init() { if(this.decks.length) this.activeDeck = this.decks[0]; },
                setCommander(targetCard) {
                    this.activeDeck.cards.forEach(c => c.isCommander = false);
                    targetCard.isCommander = true;
                    this.save();
                },
                adjustQty(card, v) { card.qty += v; if(card.qty <= 0) this.activeDeck.cards = this.activeDeck.cards.filter(x => x.id !== card.id); this.save(); },
                getCardsByCat(cat) { 
                    if (cat === 'Commander') return this.activeDeck?.cards?.filter(c => c.isCommander) || [];
                    return this.activeDeck?.cards?.filter(c => c.type_line.includes(cat) && !c.isCommander) || []; 
                },
                clean(n) { return n ? n.split(' // ')[0].replace(/[^\w\s]/gi, '').toLowerCase().trim() : ""; },
                getUsageStats(name) {
                    const target = this.clean(name);
                    const total = this.vault.reduce((s, v) => this.clean(v.name) === target ? s + v.qty : s, 0);
                    let used = 0;
                    this.decks.forEach(d => {
                        const c = d.cards.find(x => this.clean(x.name) === target);
                        if (c) used += c.qty;
                    });
                    return { total, avail: total - used };
                },
                save() { localStorage.setItem('decks', JSON.stringify(this.decks)); }
            }
        }
    </script>
</body>
</html>
