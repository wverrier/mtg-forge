<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORGE // MAIN TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gunmetal: #111c1e; --dark: #1a2527; --cyan: #4dd9f0; }
        body {
            background: var(--gunmetal); color: #e8eef0; font-family: 'Rajdhani', sans-serif;
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(77,217,240,0.02) 39px, rgba(77,217,240,0.02) 40px);
        }
        .menu-card {
            background: var(--dark); border: 1px solid rgba(77,217,240,0.1);
            transition: 0.3s; position: relative; cursor: pointer;
        }
        .menu-card:hover {
            border-color: var(--cyan); background: rgba(77,217,240,0.05);
            transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="max-w-5xl w-full px-6 text-center">
        <h1 class="text-7xl font-bold tracking-tighter text-cyan-400 mb-16" style="font-family: 'Bebas Neue'">FORGE SYSTEM v1.0</h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <a href="decks.html" class="menu-card p-10 group">
                <h2 class="text-4xl font-bold uppercase italic mb-2" style="font-family: 'Bebas Neue'">Decks</h2>
                <p class="text-slate-400 text-sm">Construct and optimize lists.</p>
            </a>
            <a href="collection.html" class="menu-card p-10 group">
                <h2 class="text-4xl font-bold uppercase italic mb-2" style="font-family: 'Bebas Neue'">Vault</h2>
                <p class="text-slate-400 text-sm">Manage owned inventory.</p>
            </a>
            <a href="import.html" class="menu-card p-10 group">
                <h2 class="text-4xl font-bold uppercase italic mb-2" style="font-family: 'Bebas Neue'">Uplink</h2>
                <p class="text-slate-400 text-sm">Import card data lists.</p>
            </a>
        </div>
    </div>
</body>
</html>
