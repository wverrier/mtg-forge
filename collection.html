<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>FORGE // VAULT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gunmetal: #111c1e; --dark: #1a2527; --cyan: #22d3ee; --steel: #8fa9b0; }
        body { background: var(--gunmetal); color: #e8eef0; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        .panel { background: var(--dark); border: 1px solid rgba(34, 211, 238, 0.1); }
        .brand-blue { color: rgb(34, 211, 238); }
        .scroll-v { overflow-y: auto; height: calc(100vh - 220px); scrollbar-width: thin; scrollbar-color: var(--cyan) transparent; }
        .card-preview-float { position: fixed; z-index: 3000; width: 240px; pointer-events: none; border-radius: 12px; border: 1px solid rgba(34, 211, 238, 0.3); }
        
        /* Cursor Logic */
        .tactical-hover { cursor: crosshair; }
        .qty-btn, .filter-btn, .page-link, .remove-btn { cursor: pointer; }

        .qty-btn { transition: 0.2s; border: 1px solid rgba(255,255,255,0.05); }
        .qty-btn:hover { background: var(--cyan); color: black; border-color: var(--cyan); }
        .set-tag { background: rgba(34, 211, 238, 0.1); color: var(--cyan); font-size: 8px; padding: 1px 4px; border-radius: 2px; font-family: monospace; }
        .filter-btn { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--steel); transition: 0.2s; border-bottom: 2px solid transparent; }
        .filter-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
        .page-link { font-family: monospace; font-size: 12px; padding: 4px 8px; border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; }
        .page-link.active { background: var(--cyan); color: black; border-color: var(--cyan); }
    </style>
</head>
<body x-data="vaultApp()" x-init="init()">

    <img x-show="hoverPreview.visible" :src="hoverPreview.url" class="card-preview-float shadow-2xl" :style="`left:${hoverPreview.x+20}px; top:${hoverPreview.y-120}px`" />

    <header class="panel px-6 py-4 flex justify-between items-center border-b border-cyan-400/20 shadow-xl">
        <div class="flex items-center gap-6">
            <a href="index.html" class="text-3xl font-bold brand-blue" style="font-family: 'Bebas Neue'">FORGE // VAULT</a>
            <nav class="flex gap-4 text-[10px] font-bold uppercase tracking-widest text-steel">
                <a href="decks.html" class="hover:brand-blue transition">Decks</a>
                <a href="import.html" class="hover:brand-blue transition">Uplink</a>
            </nav>
        </div>
        <div class="flex items-center gap-4">
            <input type="text" x-model="searchQuery" @input="currentPage = 1" placeholder="SCAN RECORDS..." class="bg-black/40 border border-white/5 p-2 text-[10px] font-mono outline-none focus:border-cyan-400 w-48">
            <div class="text-[10px] font-mono text-steel uppercase tracking-tighter">
                Live Inventory: <span class="brand-blue text-xs" x-text="filteredVault.length"></span> UNITS
            </div>
        </div>
    </header>

    <div class="bg-black/20 px-6 py-2 border-b border-white/5 flex gap-6 overflow-x-auto no-scrollbar">
        <template x-for="type in filterOptions" :key="type">
            <button @click="setFilter(type)" 
                    :class="activeFilter === type ? 'active' : ''" 
                    class="filter-btn uppercase" 
                    x-text="type"></button>
        </template>
    </div>

    <main class="p-6">
        <div class="scroll-v pr-2">
            <div x-show="paginatedVault.length === 0" class="flex flex-col items-center justify-center h-64 opacity-20">
                <p class="text-2xl font-bold italic">NO DATA DETECTED IN THIS SECTOR</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-3">
                <template x-for="(card, index) in paginatedVault" :key="index">
                    <div class="panel p-3 flex justify-between items-center group hover:border-cyan-400/30 transition-colors">
                        
                        <div class="truncate pr-2 overflow-hidden">
                            <p class="text-xs font-bold uppercase truncate tactical-hover inline-block max-w-full" 
                               @mouseenter="showPreview($event, card)" 
                               @mouseleave="hidePreview()"
                               x-text="card.name"></p>
                            <div class="flex gap-2 items-center mt-1 pointer-events-none">
                                <span class="set-tag" x-show="card.set" x-text="card.set.toUpperCase() + ' #' + (card.collector_number || '???')"></span>
                                <span class="text-[8px] text-steel uppercase opacity-50" x-text="card.type || 'Unit'"></span>
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-3">
                            <div class="flex items-center bg-black/40 rounded overflow-hidden">
                                <button @click="updateQty(card, -1)" class="qty-btn px-2 py-1 text-[10px] font-bold">-</button>
                                <span class="px-3 font-mono text-[10px] brand-blue font-bold min-w-[30px] text-center" x-text="card.qty"></span>
                                <button @click="updateQty(card, 1)" class="qty-btn px-2 py-1 text-[10px] font-bold">+</button>
                            </div>
                            
                            <button @click="purge(card)" class="remove-btn text-red-500/40 hover:text-red-500 transition px-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div class="mt-6 flex justify-center items-center gap-2 pb-8" x-show="totalPages > 1">
            <template x-for="p in totalPages" :key="p">
                <button @click="currentPage = p" 
                        :class="currentPage === p ? 'active' : ''" 
                        class="page-link" 
                        x-text="p"></button>
            </template>
        </div>
    </main>

    <script>
        function vaultApp() {
            return {
                vault: JSON.parse(localStorage.getItem('forge_vault') || '[]'),
                searchQuery: '',
                activeFilter: 'ALL',
                currentPage: 1,
                pageSize: 150,
                filterOptions: ['ALL', 'Creature', 'Land', 'Enchantment', 'Sorcery', 'Instant', 'Artifact', 'Planeswalker'],
                hoverPreview: { visible: false, url: '', x: 0, y: 0 },
                
                init() {
                    // Sorting A-Z
                    this.vault.sort((a, b) => a.name.localeCompare(b.name));
                },

                setFilter(type) {
                    this.activeFilter = type;
                    this.currentPage = 1;
                },

                get filteredVault() {
                    let results = this.vault;
                    
                    // Improved Filter Logic
                    if (this.activeFilter !== 'ALL') {
                        results = results.filter(c => {
                            // If type metadata exists (e.g., from Scryfall)
                            if (c.type && c.type.toLowerCase().includes(this.activeFilter.toLowerCase())) return true;
                            
                            // Fallback for Lands if type is just "Imported"
                            if (this.activeFilter === 'Land') {
                                const lands = ['forest', 'island', 'swamp', 'mountain', 'plains'];
                                return lands.some(l => c.name.toLowerCase().includes(l));
                            }
                            return false;
                        });
                    }

                    if (this.searchQuery) {
                        const q = this.searchQuery.toLowerCase();
                        results = results.filter(c => 
                            c.name.toLowerCase().includes(q) || 
                            (c.set && c.set.toLowerCase().includes(q))
                        );
                    }
                    return results;
                },

                get totalPages() {
                    return Math.ceil(this.filteredVault.length / this.pageSize);
                },

                get paginatedVault() {
                    const start = (this.currentPage - 1) * this.pageSize;
                    return this.filteredVault.slice(start, start + this.pageSize);
                },

                updateQty(card, val) {
                    card.qty += val;
                    if (card.qty < 1) card.qty = 1;
                    this.save();
                },

                purge(card) {
                    this.vault = this.vault.filter(c => c !== card);
                    this.save();
                },

                async showPreview(e, card) {
                    this.hoverPreview.x = e.clientX;
                    this.hoverPreview.y = e.clientY;
                    
                    let url = `https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(card.name)}`;
                    if (card.set && card.collector_number) {
                        url = `https://api.scryfall.com/cards/${card.set}/${card.collector_number}`;
                    }

                    try {
                        const res = await fetch(url);
                        const data = await res.json();
                        if (data.image_uris) {
                            this.hoverPreview.url = data.image_uris.normal;
                            this.hoverPreview.visible = true;
                        } else if (data.card_faces) {
                            this.hoverPreview.url = data.card_faces[0].image_uris.normal;
                            this.hoverPreview.visible = true;
                        }
                    } catch (err) { console.error("Neural link timeout."); }
                },

                hidePreview() {
                    this.hoverPreview.visible = false;
                    this.hoverPreview.url = '';
                },

                save() {
                    localStorage.setItem('forge_vault', JSON.stringify(this.vault));
                }
            }
        }
    </script>
</body>
</html>
