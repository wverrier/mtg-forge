<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORGE // MOXFIELD ONEMORETIME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gunmetal: #111c1e; --dark: #1a2527; --cyan: #4dd9f0; }
        body { background: var(--gunmetal); color: #e8eef0; font-family: 'Rajdhani', sans-serif; min-height: 100vh; }
        .panel { background: var(--dark); border: 1px solid rgba(77,217,240,0.1); }
        textarea { background: rgba(0,0,0,0.3) !important; border: 1px solid rgba(77,217,240,0.2) !important; color: #4dd9f0 !important; font-family: monospace; }
        .btn-primary { background: transparent; border: 1px solid var(--cyan); color: var(--cyan); font-family: 'Bebas Neue'; transition: 0.2s; cursor: pointer; }
        .btn-primary:hover { background: var(--cyan); color: var(--gunmetal); box-shadow: 0 0 15px var(--cyan); }
        .nav-tab { cursor: pointer; padding: 4px 12px; border-bottom: 2px solid transparent; font-size: 12px; letter-spacing: 1px; transition: 0.3s; color: #64748b; }
        .nav-tab.active { color: var(--cyan); border-bottom: 2px solid var(--cyan); }
    </style>
</head>
<body x-data="moxfieldTranslator()">

    <div class="max-w-4xl mx-auto py-12 px-6">
        <header class="mb-8 border-b border-cyan-400/20 pb-6 flex justify-between items-end">
            <div>
                <h1 class="text-5xl font-bold text-cyan-400 italic" style="font-family: 'Bebas Neue'">MOXFIELD // TRANSLATOR</h1>
                <p class="text-slate-400 text-sm tracking-widest uppercase">V11: Multi-Mode Deck & Collection Uplink</p>
            </div>
            
            <nav class="flex gap-4">
                <div @click="mode = 'csv'" :class="mode === 'csv' ? 'nav-tab active' : 'nav-tab'">OPTION 1: CSV</div>
                <div @click="mode = 'txt'" :class="mode === 'txt' ? 'nav-tab active' : 'nav-tab'">OPTION 2: DECK (TXT)</div>
            </nav>
        </header>

        <div class="grid gap-6">
            <div class="panel p-6">
                <label class="block text-[10px] font-bold text-cyan-400 mb-2 uppercase tracking-widest">Input Raw Data</label>
                <textarea x-model="rawInput" rows="8" class="w-full p-4 rounded focus:outline-none focus:border-cyan-400" placeholder="Paste data here..."></textarea>
            </div>

            <div class="flex justify-center">
                <button @click="processData()" class="btn-primary px-16 py-3 text-xl uppercase italic" 
                        x-text="mode === 'csv' ? 'Generate CSV File' : 'Format for Decklist'"></button>
            </div>

            <div class="panel p-6" x-show="output">
                <div class="flex justify-between items-center mb-2">
                    <label class="text-[10px] font-bold text-cyan-400 uppercase tracking-widest" 
                           x-text="mode === 'csv' ? 'CSV Result (Use for Collection Import)' : 'TXT Result (Copy/Paste into Deck Editor)'"></label>
                    
                    <div class="flex gap-2">
                        <button @click="copyToClipboard()" class="text-[10px] text-white bg-white/10 px-2 py-1 hover:bg-cyan-400 hover:text-black transition uppercase">Copy</button>
                        <button x-show="mode === 'csv'" @click="downloadCSV()" class="text-[10px] text-white bg-white/10 px-2 py-1 hover:bg-cyan-400 hover:text-black transition uppercase">Download .CSV</button>
                    </div>
                </div>
                <textarea x-model="output" readonly rows="10" class="w-full p-4 rounded opacity-80 text-sm" id="outputArea"></textarea>
            </div>
        </div>
    </div>

    <script>
        function moxfieldTranslator() {
            return {
                mode: 'csv', // 'csv' or 'txt'
                rawInput: '',
                output: '',
                
                processData() {
                    if (!this.rawInput.trim()) return;
                    const lines = this.rawInput.split('\n');
                    let results = [];

                    if (this.mode === 'csv') {
                        results.push('Count,Name,Edition,Condition,Language,Foil,Collector Number');
                    }
                    
                    lines.forEach(line => {
                        const trimmed = line.trim();
                        if (!trimmed) return;

                        const countMatch = trimmed.match(/^(\d+)\s+/);
                        if (!countMatch) return;
                        const count = countMatch[1];
                        let remainder = trimmed.substring(countMatch[0].length).trim();

                        const setMatch = remainder.match(/\[(.*?)\]/);
                        if (!setMatch) return;
                        let set = setMatch[1].trim();
                        
                        const setIndex = remainder.indexOf(setMatch[0]);
                        let namePart = remainder.substring(0, setIndex).trim();
                        let extraPart = remainder.substring(setIndex + setMatch[0].length).trim();

                        // Filter non-cards
                        if (namePart.toLowerCase().includes('token') || namePart.toLowerCase().includes('thick stock')) return;

                        // List/SPG Logic
                        const listSetMatch = namePart.match(/\((.*?)\)/);
                        if ((set === 'LIST' || set === 'SPG') && listSetMatch) {
                            set = listSetMatch[1];
                        }

                        // Reskin Logic (FCA/SLD)
                        if (namePart.includes(" - ") && ['FCA', 'SLD'].includes(set)) {
                            namePart = namePart.split(" - ").pop().trim();
                        }

                        // Clean Name
                        let cleanName = namePart
                            .replace(/\s*\(.*?\)/g, '')
                            .replace(/\s*-\s*(Full Art|Showcase|Borderless|Textured|Extended|Etched|Retro)/gi, '')
                            .trim();

                        // Collector Number
                        let colNum = '';
                        const allDigits = (namePart + " " + extraPart).match(/\b\d{1,4}\b/g);
                        if (allDigits) colNum = allDigits[allDigits.length - 1];

                        // Foil
                        let foilFlag = /foil/i.test(extraPart + namePart) ? 'foil' : '';

                        if (this.mode === 'csv') {
                            const quotedName = `"${cleanName.replace(/"/g, '""')}"`;
                            results.push(`${count},${quotedName},${set},Near Mint,English,${foilFlag},${colNum}`);
                        } else {
                            // TXT DECK FORMAT: "1 Card Name [SET] 123"
                            // Moxfield deck editor prefers this exact string
                            results.push(`${count} ${cleanName} [${set}] ${colNum}`);
                        }
                    });

                    this.output = results.join('\n');
                },

                copyToClipboard() {
                    const el = document.getElementById('outputArea');
                    el.select();
                    document.execCommand('copy');
                    alert('Copied to clipboard!');
                },

                downloadCSV() {
                    const blob = new Blob([this.output], { type: 'text/csv;charset=utf-8;' });
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(blob);
                    link.setAttribute("download", "forge_export.csv");
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }
            }
        }
    </script>
</body>
</html>
