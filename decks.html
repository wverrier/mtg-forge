<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>FORGE // DECK COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gunmetal: #111c1e; --dark: #1a2527; --cyan: #22d3ee; --steel: #8fa9b0; --warn: #eb5f7a; --ok: #4ade80; }
        
        body { background: var(--gunmetal); color: #e8eef0; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        .panel { background: var(--dark); border: 1px solid rgba(34, 211, 238, 0.1); }
        .btn-primary { border: 1px solid var(--cyan); color: var(--cyan); padding: 0.5rem; text-transform: uppercase; font-weight: 700; clip-path: polygon(0 0, 92% 0, 100% 25%, 100% 100%, 8% 100%, 0 75%); transition: 0.2s; cursor: pointer; }
        .btn-primary:hover { background: var(--cyan); color: black; }
        
        .card-preview-float { position: fixed; z-index: 9000; width: 240px; pointer-events: none; border-radius: 12px; border: 1px solid rgba(34, 211, 238, 0.3); box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .scroll-v { overflow-y: auto; height: calc(100vh - 280px); scrollbar-width: thin; scrollbar-color: var(--cyan) transparent; }
        .brand-blue { color: rgb(34, 211, 238); }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #000; border-left: 4px solid var(--cyan); padding: 12px 24px; font-family: monospace; z-index: 5000; font-size: 10px; letter-spacing: 1px; }

        /* Search Dropdown - Restricted Height, No Hover Preview */
        .search-container { position: relative; }
        .search-results { position: absolute; top: 100%; right: 0; width: 280px; background: #000; border: 1px solid var(--cyan); z-index: 5000; max-height: 250px; overflow-y: auto; }

        .hud-counter { font-family: 'monospace'; font-size: 8px; letter-spacing: 1px; color: rgba(143, 169, 176, 0.4); background: rgba(255, 255, 255, 0.03); padding: 4px 10px; border-radius: 2px; }
        .hud-counter.deficit { background: rgba(235, 95, 122, 0.1); color: var(--warn); border: 1px solid rgba(235, 95, 122, 0.2); }
        .status-icon { font-size: 10px; width: 14px; font-weight: bold; }
        .btn-cmdr { font-size: 8px; font-weight: 900; padding: 2px 4px; border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); transition: 0.2s; cursor: pointer; }
        .btn-cmdr.active { border-color: var(--cyan); color: var(--cyan); background: rgba(34, 211, 238, 0.1); }
        
        .dragging { opacity: 0.3; }
        .drag-over { border-top: 2px solid var(--cyan); }
        .category-header { font-family: 'Bebas Neue'; letter-spacing: 1px; color: var(--steel); border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 12px; padding-bottom: 2px; }

        /* Commander Visual Tag - RESTORED */
        .cmdr-visual-tag { 
            position: absolute; top: -5px; right: -15px; 
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: #000; font-weight: 900; font-size: 8px; font-family: monospace; 
            padding: 3px 12px; transform: rotate(15deg);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5); 
            border: 1px solid #78350f;
            letter-spacing: -0.5px;
            z-index: 10;
        }
    </style>
</head>
<body x-data="deckApp()" x-init="init()" @mousemove="moveMouse($event)">
    
    <div x-show="toast.visible" x-text="toast.msg" class="toast uppercase italic" x-transition></div>
    <img x-show="hoverPreview" :src="hoverPreview" class="card-preview-float" :style="`left: ${mouseX + 20}px; top: ${mouseY - 120}px`" x-transition:enter.opacity.30ms>

    <header class="panel px-6 py-4 flex justify-between items-center border-b border-cyan-400/20">
        <div class="flex items-center gap-6">
            <a href="index.html" class="text-3xl font-bold brand-blue" style="font-family: 'Bebas Neue'">FORGE // DECK COMMAND</a>
            <nav class="flex gap-4 text-[10px] font-bold uppercase tracking-widest text-steel">
                <a href="collection.html" class="hover:brand-blue transition">Vault</a>
                <a href="import.html" class="hover:brand-blue transition">Uplink</a>
            </nav>
        </div>
        <div class="flex gap-2">
            <button @click="viewMode = 'list'" :class="viewMode === 'list' ? 'bg-cyan-400 text-black' : 'bg-white/5'" class="px-3 py-1 text-[10px] font-bold uppercase">List</button>
            <button @click="viewMode = 'visual'" :class="viewMode === 'visual' ? 'bg-cyan-400 text-black' : 'bg-white/5'" class="px-3 py-1 text-[10px] font-bold uppercase">Visual</button>
        </div>
    </header>

    <main class="grid grid-cols-12 gap-4 p-4 h-[calc(100vh-80px)]">
        <div class="col-span-2 panel p-4 flex flex-col">
            <button @click="createNewDeck()" class="w-full btn-primary text-xs mb-6">+ Initialise List</button>
            <div class="flex-1 overflow-y-auto" @dragover.prevent @drop="handleDrop()">
                <template x-for="(deck, index) in decks" :key="deck.id">
                    <div class="group relative mb-2" draggable="true" @dragstart="dragSrcIndex = index" @dragover.prevent="dragOverIndex = index" @dragleave="dragOverIndex = null" :class="{ 'dragging': dragSrcIndex === index, 'drag-over': dragOverIndex === index }">
                        <div @click="activeDeck = deck" :class="activeDeck?.id === deck.id ? 'border-cyan-400 bg-cyan-400/5' : 'border-transparent opacity-60'" class="p-3 border-l-2 transition hover:opacity-100 cursor-pointer">
                            <div x-text="deck.name" class="font-bold text-sm uppercase truncate pr-8"></div>
                            <div class="text-[9px] font-mono brand-blue" x-text="countAllCards(deck) + ' UNITS'"></div>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div class="col-span-10 flex flex-col gap-4" x-show="activeDeck">
            <div class="panel p-6 grid grid-cols-3 items-center gap-4 relative overflow-hidden">
                <div class="absolute top-[-20px] right-1/2 translate-x-1/2 opacity-5 font-mono text-[120px] leading-none select-none brand-blue" x-text="countAllCards(activeDeck)"></div>
                <div><h2 class="text-4xl font-bold uppercase italic truncate" x-text="activeDeck.name"></h2></div>
                <div class="flex flex-col items-center justify-center border-x border-white/5 h-full z-10">
                    <p class="text-[10px] text-steel uppercase tracking-[0.3em] mb-1">Combat Readiness</p>
                    <div class="flex gap-6 font-mono text-sm brand-blue font-bold">
                        <span>COUNT: <span x-text="countAllCards(activeDeck)"></span></span>
                        <span>VALUE: <span class="text-white">$<span x-text="getDeckPrice()"></span></span></span>
                    </div>
                </div>
                <div class="z-10 search-container flex flex-col items-end gap-1">
                    <input type="text" x-model="searchQuery" @input.debounce.500ms="searchCards()" placeholder="QUERY DATABASE..." class="w-full max-w-[280px] bg-black/40 border border-cyan-400/20 p-2 text-xs font-mono focus:border-cyan-400 outline-none">
                    
                    <div x-show="searchResults.length > 0" @click.away="searchResults = []" class="search-results shadow-2xl">
                        <template x-for="res in searchResults" :key="res.id">
                            <div @click="addCardToDeck(res)" class="p-2 border-b border-white/5 hover:bg-cyan-400 hover:text-black cursor-pointer flex justify-between items-center transition-colors">
                                <span class="text-[10px] font-bold uppercase truncate" x-text="res.name"></span>
                                <span class="text-[8px] opacity-60 font-mono" x-text="'$' + (res.prices?.usd || '0.00')"></span>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <div class="flex-1 overflow-hidden scroll-v pr-2">
                <template x-for="cat in categories" :key="cat">
                    <div x-show="getCardsByCat(cat).length > 0" class="mb-8 relative">
                        <h3 class="category-header text-sm flex justify-between">
                            <span x-text="cat"></span>
                            <span class="opacity-40" x-text="getCardsByCat(cat).reduce((a, b) => a + b.qty, 0)"></span>
                        </h3>
                        
                        <div x-show="viewMode === 'list'" class="grid grid-cols-1 gap-1">
                            <template x-for="card in getCardsByCat(cat)" :key="card.id">
                                <div class="flex justify-between items-center py-1.5 hover:bg-white/[0.02] px-2 group rounded border-b border-white/[0.02]">
                                    <div class="flex items-center gap-3 truncate">
                                        <span class="status-icon" :class="getStatusColor(card)" x-text="getStatusIcon(card)"></span>
                                        <div class="flex items-center gap-3">
                                            <span @mouseenter="hoverPreview = card.image_uris?.normal" @mouseleave="hoverPreview = null" x-text="card.name" class="text-xs font-bold truncate group-hover:brand-blue transition-colors cursor-help"></span>
                                            <button x-show="isCreature(card)" @click="setCommander(card)" class="btn-cmdr uppercase" :class="card.isCommander ? 'active' : ''" x-text="card.isCommander ? 'CMDR ACTIVE' : 'SET CMDR'"></button>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-4">
                                        <div class="hud-counter flex gap-2 items-center">
                                            <span x-text="getUsageStats(card.name).deckCount"></span> DECKS | <span x-text="getUsageStats(card.name).avail"></span> AVAIL
                                        </div>
                                        <div class="flex items-center bg-black/40 rounded border border-white/5">
                                            <button @click="adjustQty(card, -1)" class="px-3 py-1 text-steel hover:brand-blue">-</button>
                                            <span class="text-[10px] font-mono w-6 text-center" x-text="card.qty"></span>
                                            <button @click="adjustQty(card, 1)" class="px-3 py-1 text-steel hover:brand-blue">+</button>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>

                        <div x-show="viewMode === 'visual'" class="grid grid-cols-5 gap-4">
                            <template x-for="card in getCardsByCat(cat)" :key="card.id">
                                <div class="relative group aspect-[3/4] rounded-lg border border-white/10 hover:border-cyan-400 overflow-visible">
                                    
                                    <div x-show="card.isCommander" class="cmdr-visual-tag">COMMANDER</div>
                                    
                                    <img :src="card.image_uris?.normal" class="w-full h-full object-cover rounded-lg">
                                    <div class="absolute inset-0 bg-black/80 opacity-0 group-hover:opacity-100 flex flex-col justify-center items-center p-3 transition-opacity rounded-lg">
                                        <p class="text-[10px] font-bold uppercase mb-2 text-center" x-text="card.name"></p>
                                        <div class="flex gap-2">
                                            <button @click="adjustQty(card, -1)" class="bg-white/10 px-2">-</button>
                                            <span class="brand-blue font-bold" x-text="card.qty"></span>
                                            <button @click="adjustQty(card, 1)" class="bg-white/10 px-2">+</button>
                                        </div>
                                        <button @click="removeCompletely(card)" class="text-[8px] bg-red-600 text-white px-2 py-1 uppercase font-bold mt-3">Purge</button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </main>

    <script>
        function deckApp() {
            return {
                decks: JSON.parse(localStorage.getItem('decks') || '[]'),
                vault: JSON.parse(localStorage.getItem('forge_vault') || '[]'),
                activeDeck: null, searchQuery: '', searchResults: [], viewMode: 'list',
                hoverPreview: null, mouseX: 0, mouseY: 0,
                categories: ['Commander', 'Creature', 'Sorcery', 'Instant', 'Artifact', 'Enchantment', 'Planeswalker', 'Land'],
                toast: { visible: false, msg: '' },
                dragSrcIndex: null, dragOverIndex: null,

                init() { if(this.decks.length) this.activeDeck = this.decks[0]; },
                notify(msg) { this.toast = { visible: true, msg }; setTimeout(() => this.toast.visible = false, 3000); },
                save() { localStorage.setItem('decks', JSON.stringify(this.decks)); },
                
                addCardToDeck(card) {
                    if(!this.activeDeck.cards) this.activeDeck.cards = [];
                    let existing = this.activeDeck.cards.find(c => c.id === card.id);
                    if(existing) existing.qty++;
                    else this.activeDeck.cards.push({
                        id: card.id, name: card.name, qty: 1, isCommander: false,
                        image_uris: card.image_uris, type_line: card.type_line, prices: card.prices
                    });
                    this.save(); this.searchResults = []; this.searchQuery = ''; this.notify("UNIT ADDED");
                },

                async searchCards() {
                    if(this.searchQuery.length < 3) { this.searchResults = []; return; }
                    const res = await fetch(`https://api.scryfall.com/cards/search?q=${encodeURIComponent(this.searchQuery)}`);
                    const data = await res.json();
                    this.searchResults = data.data?.slice(0, 10) || [];
                },

                handleDrop() {
                    if (this.dragSrcIndex !== null && this.dragOverIndex !== null) {
                        const item = this.decks.splice(this.dragSrcIndex, 1)[0];
                        this.decks.splice(this.dragOverIndex, 0, item);
                        this.save();
                    }
                    this.dragSrcIndex = null; this.dragOverIndex = null;
                },

                getUsageStats(name) {
                    const clean = n => n.split(' // ')[0].toLowerCase().trim();
                    const target = clean(name);
                    const own = this.vault.reduce((s, v) => clean(v.name) === target ? s + v.qty : s, 0);
                    let used = 0, count = 0;
                    this.decks.forEach(d => {
                        const c = d.cards.find(x => clean(x.name) === target);
                        if(c) { count++; used += c.qty; }
                    });
                    return { totalOwned: own, deckCount: count, avail: own - used };
                },

                getStatusIcon(c) { const s = this.getUsageStats(c.name); return s.totalOwned === 0 ? '✕' : (s.avail < 0 ? '!' : '✓'); },
                getStatusColor(c) { const s = this.getUsageStats(c.name); return s.totalOwned === 0 ? 'text-red-500' : (s.avail < 0 ? 'text-cyan-400' : 'text-green-400'); },
                isCreature(c) { return c.type_line?.toLowerCase().includes('creature'); },
                setCommander(c) { this.activeDeck.cards.forEach(x => x.isCommander = false); c.isCommander = true; this.save(); },
                getCardsByCat(cat) {
                    if(!this.activeDeck?.cards) return [];
                    return this.activeDeck.cards.filter(c => cat === 'Commander' ? c.isCommander : (!c.isCommander && c.type_line.includes(cat)));
                },
                moveMouse(e) { this.mouseX = e.clientX; this.mouseY = e.clientY; },
                countAllCards(d) { return d?.cards?.reduce((s, c) => s + c.qty, 0) || 0; },
                getDeckPrice() { return this.activeDeck?.cards?.reduce((s, c) => s + (parseFloat(c.prices?.usd || 0)*c.qty), 0).toFixed(2) || '0.00'; },
                adjustQty(c, v) { c.qty += v; if(c.qty <= 0) this.removeCompletely(c); this.save(); },
                removeCompletely(c) { this.activeDeck.cards = this.activeDeck.cards.filter(x => x.id !== c.id); this.save(); },
                deleteDeck(id) { if(confirm("PURGE?")) { this.decks = this.decks.filter(d => d.id !== id); if(this.activeDeck?.id === id) this.activeDeck = this.decks[0] || null; this.save(); } },
                createNewDeck() { const n = prompt("ID:"); if(n) { const d = {id: Date.now(), name: n, cards: []}; this.decks.push(d); this.activeDeck = d; this.save(); } }
            }
        }
    </script>
</body>
</html>
