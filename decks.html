<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>FORGE // TACTICAL BUILDER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gunmetal: #111c1e; --dark: #1a2527; --cyan: #22d3ee; --steel: #8fa9b0; --warn: #eb5f7a; --ok: #4ade80; }
        
        .sidebar-active { cursor: none !important; }
        #custom-cursor {
            width: 16px; height: 16px; border: 1px solid var(--cyan); border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 9999;
            transition: transform 0.1s ease-out, background 0.2s;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 8px rgba(34, 211, 238, 0.3);
            display: none; 
        }
        .sidebar-active #custom-cursor { display: block; }
        #custom-cursor::after {
            content: ''; width: 2px; height: 2px; background: var(--cyan);
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border-radius: 50%;
        }
        .cursor-hover #custom-cursor { transform: translate(-50%, -50%) scale(1.4); background: rgba(34, 211, 238, 0.15); }

        body { background: var(--gunmetal); color: #e8eef0; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        .panel { background: var(--dark); border: 1px solid rgba(34, 211, 238, 0.1); }
        .btn-primary { border: 1px solid var(--cyan); color: var(--cyan); padding: 0.5rem; text-transform: uppercase; font-weight: 700; clip-path: polygon(0 0, 92% 0, 100% 25%, 100% 100%, 8% 100%, 0 75%); transition: 0.2s; }
        .btn-primary:hover { background: var(--cyan); color: black; }
        
        .card-preview-float { position: fixed; z-index: 3000; width: 240px; pointer-events: none; border-radius: 12px; border: 1px solid rgba(34, 211, 238, 0.3); }
        .category-header { font-family: 'Bebas Neue'; letter-spacing: 2px; color: var(--steel); border-bottom: 1px solid rgba(34, 211, 238, 0.2); margin-bottom: 16px; padding-bottom: 4px; text-transform: uppercase; }
        .scroll-v { overflow-y: auto; height: calc(100vh - 280px); scrollbar-width: thin; scrollbar-color: var(--cyan) transparent; }
        .brand-blue { color: rgb(34, 211, 238); }
        
        .hud-counter { font-family: 'monospace'; font-size: 8px; color: rgba(143, 169, 176, 0.7); background: rgba(0, 0, 0, 0.8); padding: 2px 6px; border-radius: 2px; border: 1px solid rgba(255,255,255,0.1); }
        .hud-counter.deficit { background: rgba(235, 95, 122, 0.6); color: white; border: 1px solid var(--warn); }
        .cmdr-tag { background: var(--cyan); color: black; font-family: 'Bebas Neue'; padding: 2px 8px; font-size: 10px; clip-path: polygon(10% 0, 100% 0, 100% 100%, 0 100%); }

        .search-results-container { position: fixed; background: rgba(17, 28, 30, 0.98); border: 1px solid rgba(34, 211, 238, 0.4); z-index: 5000; margin-top: 5px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); backdrop-filter: blur(15px); max-height: 400px; overflow-y: auto; }

        .visual-section { margin-bottom: 40px; }
        .visual-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .visual-card-wrapper { position: relative; transition: transform 0.2s ease; }
        .visual-card-wrapper:hover { transform: scale(1.05); z-index: 10; }
        .visual-card { width: 100%; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .visual-card.is-cmdr { border: 2px solid var(--cyan); box-shadow: 0 0 15px var(--cyan); }

        .import-banner { position: fixed; bottom: 0; right: 20px; width: 400px; z-index: 4000; border: 1px solid rgba(34, 211, 238, 0.3); border-bottom: none; background: rgba(17, 28, 30, 0.95); backdrop-filter: blur(10px); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .import-banner.collapsed { transform: translateY(calc(100% - 32px)); }
        .banner-header { height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; background: rgba(34, 211, 238, 0.05); }
        .btn-mini { font-size: 7px; border: 1px solid rgba(34, 211, 238, 0.3); padding: 1px 4px; border-radius: 2px; color: var(--cyan); }
        .btn-mini:hover { background: var(--cyan); color: black; }
    </style>
</head>
<body x-data="deckApp()" x-init="init()" @mousemove="moveCursor($event)" :class="{'sidebar-active': inSidebar, 'cursor-hover': isHovering}">
    
    <div id="custom-cursor"></div>
    <img x-show="hoverPreview.visible && viewMode === 'list'" :src="hoverPreview.url" class="card-preview-float shadow-2xl" :style="`left:${hoverPreview.x+20}px; top:${hoverPreview.y-120}px`" />

    <header class="panel px-6 py-4 flex justify-between items-center border-b border-cyan-400/20">
        <div class="flex items-center gap-8">
            <a href="index.html" class="text-3xl font-bold brand-blue" style="font-family: 'Bebas Neue'">FORGE // DECKS</a>
            <nav class="flex gap-6 text-[11px] font-bold uppercase tracking-widest text-steel">
                <a href="collection.html" class="hover:brand-blue transition">Vault</a>
                <a href="import.html" class="hover:brand-blue transition">Uplink</a>
            </nav>
        </div>
        <div class="flex gap-2">
            <button @click="viewMode = 'list'" :class="viewMode === 'list' ? 'bg-cyan-400 text-black' : 'bg-white/5 text-steel'" class="px-4 py-1.5 text-[10px] font-bold uppercase transition">List View</button>
            <button @click="viewMode = 'visual'" :class="viewMode === 'visual' ? 'bg-cyan-400 text-black' : 'bg-white/5 text-steel'" class="px-4 py-1.5 text-[10px] font-bold uppercase transition">Visual View</button>
        </div>
    </header>

    <main class="grid grid-cols-12 gap-4 p-4 h-[calc(100vh-80px)]">
        <div class="col-span-2 panel p-4 flex flex-col" @mouseenter="inSidebar = true" @mouseleave="inSidebar = false; isHovering = false">
            <button @click="createNewDeck()" @mouseenter="isHovering = true" @mouseleave="isHovering = false" class="w-full btn-primary text-xs mb-6">+ Initialise List</button>
            <div class="flex-1 overflow-y-auto" @dragover.prevent @drop="handleDrop()">
                <template x-for="(deck, index) in decks" :key="deck.id">
                    <div class="group relative mb-2" draggable="true" @dragstart="handleDragStart(index)" @dragover.prevent="dragOverIndex = index" @dragleave="dragOverIndex = null" :class="{ 'dragging': dragSrcIndex === index, 'drag-over': dragOverIndex === index }">
                        <div @click="activeDeck = deck" @mouseenter="isHovering = true" @mouseleave="isHovering = false" :class="activeDeck?.id === deck.id ? 'border-cyan-400 bg-cyan-400/5' : 'border-transparent opacity-60'" class="p-3 border-l-2 transition hover:opacity-100 cursor-pointer">
                            <div x-text="deck.name" class="font-bold text-sm uppercase truncate pr-8"></div>
                            <div class="text-[9px] font-mono brand-blue" x-text="countAllCards(deck) + ' UNITS'"></div>
                        </div>
                        <button @click.stop="deleteDeck(deck.id)" @mouseenter="isHovering = true" @mouseleave="isHovering = false" class="absolute top-4 right-2 text-[8px] font-black text-red-500 opacity-0 group-hover:opacity-100 transition-opacity hover:underline">PURGE</button>
                    </div>
                </template>
            </div>
        </div>

        <div class="col-span-10 flex flex-col gap-4" x-show="activeDeck">
            <div class="panel p-6 grid grid-cols-3 items-center gap-4 relative overflow-hidden">
                <div class="absolute top-[-20px] right-1/2 translate-x-1/2 opacity-5 font-mono text-[120px] leading-none select-none brand-blue" x-text="countAllCards(activeDeck)"></div>
                <div><h2 class="text-4xl font-bold uppercase italic truncate" x-text="activeDeck.name"></h2></div>
                <div class="flex flex-col items-center justify-center border-x border-white/5 h-full z-10">
                    <p class="text-[10px] text-steel uppercase tracking-[0.3em] mb-1">Combat Readiness</p>
                    <div class="flex gap-6 font-mono text-sm brand-blue font-bold">
                        <span>COUNT: <span x-text="countAllCards(activeDeck)"></span></span>
                        <span>VALUE: <span class="text-white">$<span x-text="getDeckPrice()"></span></span></span>
                    </div>
                </div>
                <div class="z-10 flex flex-col items-end gap-2 relative" x-ref="searchWrapper">
                    <input type="text" x-model="searchQuery" @input.debounce.500ms="searchCards()" placeholder="QUERY DATABASE..." class="w-full max-w-[280px] bg-black/40 border border-cyan-400/20 p-2 text-xs font-mono focus:border-cyan-400 outline-none">
                    <div x-show="searchResults.length > 0" @click.away="searchResults = []" class="search-results-container" :style="`top: ${$refs.searchWrapper.getBoundingClientRect().bottom}px; left: ${$refs.searchWrapper.getBoundingClientRect().left}px; width: ${$refs.searchWrapper.offsetWidth}px;`" x-transition>
                        <template x-for="res in searchResults" :key="res.id">
                            <div @click="addCardToDeck(res)" class="p-2 border-b border-white/5 flex items-center gap-3 cursor-pointer hover:bg-cyan-400/10 group transition-all">
                                <img :src="res.image_uris?.small" class="w-8 h-11 rounded-sm shadow-md">
                                <p class="text-[10px] font-bold truncate group-hover:text-cyan-400" x-text="res.name"></p>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <div class="scroll-v pr-2">
                <template x-if="viewMode === 'list'">
                    <div>
                        <template x-for="cat in categories" :key="cat">
                            <div x-show="getCardsByCat(cat).length > 0" class="mb-8">
                                <h3 class="category-header text-sm flex justify-between">
                                    <span x-text="cat"></span>
                                </h3>
                                <div class="grid grid-cols-1 gap-1">
                                    <template x-for="card in getCardsByCat(cat)" :key="card.id">
                                        <div class="flex justify-between items-center py-1.5 hover:bg-white/[0.02] px-2 group rounded border-b border-white/[0.02]">
                                            <div class="flex items-center gap-3">
                                                <span class="status-icon font-mono text-[10px]" :class="getStatusColor(card)" x-text="getStatusIcon(card)"></span>
                                                <span @mouseenter="showPreview($event, card.image_uris?.normal)" @mouseleave="hidePreview()" :class="card.isCommander ? 'text-cyan-400 italic underline' : ''" x-text="card.name" class="text-xs font-bold truncate group-hover:brand-blue transition-colors"></span>
                                                <span x-show="card.isCommander" class="text-[8px] border border-cyan-400/40 px-1 rounded text-cyan-400">CMDR</span>
                                            </div>
                                            <div class="flex items-center gap-4">
                                                <button x-show="card.type_line.includes('Creature') || card.type_line.includes('Planeswalker')" @click="setCommander(card)" class="text-[8px] font-black tracking-tighter text-steel hover:text-cyan-400 transition" x-text="card.isCommander ? '' : 'SET CMDR'"></button>
                                                <div class="hud-counter" :class="getUsageStats(card.name).avail < 0 ? 'deficit' : ''" x-text="getUsageStats(card.name).avail + ' AVAIL'"></div>
                                                <div class="flex items-center bg-black/40 rounded border border-white/5">
                                                    <button @click="adjustQty(card, -1)" class="px-3 py-1 text-steel hover:brand-blue">-</button>
                                                    <span class="text-[10px] font-mono w-6 text-center" x-text="card.qty"></span>
                                                    <button @click="adjustQty(card, 1)" class="px-3 py-1 text-steel hover:brand-blue">+</button>
                                                </div>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>

                <template x-if="viewMode === 'visual'">
                    <div>
                        <template x-for="cat in categories" :key="cat">
                            <div x-show="getCardsByCat(cat).length > 0" class="visual-section">
                                <h3 class="category-header text-xs" x-text="cat"></h3>
                                <div class="visual-grid">
                                    <template x-for="card in getCardsByCat(cat)" :key="card.id">
                                        <div class="visual-card-wrapper group">
                                            <img :src="card.image_uris?.normal" class="visual-card" :class="card.isCommander ? 'is-cmdr' : ''">
                                            
                                            <div x-show="card.isCommander" class="absolute -top-2 -right-1 z-20">
                                                <div class="cmdr-tag">COMMANDER</div>
                                            </div>

                                            <div class="absolute top-2 left-2 flex flex-col gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                <div class="hud-counter" :class="getUsageStats(card.name).avail < 0 ? 'deficit' : ''" x-text="getUsageStats(card.name).avail + ' AVAIL'"></div>
                                                <div class="hud-counter bg-cyan-400 text-black font-black border-none" x-text="card.qty + 'x'"></div>
                                            </div>

                                            <div class="absolute inset-0 flex flex-col items-center justify-center gap-4 opacity-0 group-hover:opacity-100 transition-opacity bg-black/40 backdrop-blur-[1px] rounded-lg">
                                                <div class="flex gap-4">
                                                    <button @click="adjustQty(card, -1)" class="bg-black/90 border border-cyan-400/40 w-10 h-10 rounded-full flex items-center justify-center text-xl hover:bg-cyan-400 hover:text-black transition">-</button>
                                                    <button @click="adjustQty(card, 1)" class="bg-black/90 border border-cyan-400/40 w-10 h-10 rounded-full flex items-center justify-center text-xl hover:bg-cyan-400 hover:text-black transition">+</button>
                                                </div>
                                                <button x-show="!card.isCommander && (card.type_line.includes('Creature') || card.type_line.includes('Planeswalker'))" @click="setCommander(card)" class="bg-cyan-400 text-black px-4 py-1 text-[10px] font-black uppercase tracking-widest clip-path:polygon(0 0, 90% 0, 100% 30%, 100% 100%, 10% 100%, 0 70%)">SET CMDR</button>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </div>
        </div>
    </main>

    <div class="import-banner" :class="terminalOpen ? '' : 'collapsed'" x-show="activeDeck" x-data="{ terminalOpen: false, rawList: '', isProcessing: false }">
        <div class="banner-header" @click="terminalOpen = !terminalOpen">
            <span class="text-[10px] font-black tracking-widest brand-blue flex items-center gap-2">
                <span x-text="terminalOpen ? '▼' : '▲'"></span> BULK UPLINK TERMINAL
            </span>
            <span x-show="isProcessing" class="text-[8px] animate-pulse">SYNCHRONIZING...</span>
        </div>
        <div class="p-4">
            <div class="flex justify-between items-center mb-2">
                <p class="text-[9px] text-steel uppercase font-mono tracking-tighter">Enter Card List</p>
                <button @click="rawList = formatRawList(rawList)" class="btn-mini uppercase font-black">Format List</button>
            </div>
            <textarea x-model="rawList" class="w-full h-32 border border-cyan-400/20 p-2 text-[10px] font-mono text-cyan-200 outline-none focus:border-cyan-400 mb-3 bg-black/40"></textarea>
            <div class="flex gap-2">
                <button @click="processImport($data)" :disabled="isProcessing" class="flex-1 btn-primary text-[10px]">INTEGRATE UNITS</button>
                <button @click="rawList = ''" class="px-3 py-1 border border-white/10 text-steel text-[10px] uppercase hover:text-white transition">Clear</button>
            </div>
        </div>
    </div>

    <script>
        function deckApp() {
            return {
                decks: JSON.parse(localStorage.getItem('decks') || '[]'),
                vault: JSON.parse(localStorage.getItem('forge_vault') || '[]'),
                activeDeck: null, searchQuery: '', searchResults: [], viewMode: 'list',
                categories: ['Commander', 'Creature', 'Sorcery', 'Instant', 'Artifact', 'Enchantment', 'Planeswalker', 'Land'],
                hoverPreview: { visible: false, url: '', x: 0, y: 0 },
                dragSrcIndex: null, dragOverIndex: null, inSidebar: false, isHovering: false,

                init() { if(this.decks.length) this.activeDeck = this.decks[0]; },
                moveCursor(e) { if(!this.inSidebar) return; const c = document.getElementById('custom-cursor'); c.style.left = e.clientX+'px'; c.style.top = e.clientY+'px'; },

                setCommander(targetCard) {
                    this.activeDeck.cards.forEach(c => c.isCommander = false);
                    targetCard.isCommander = true;
                    this.save();
                },

                handleDragStart(index) { this.dragSrcIndex = index; },
                handleDrop() {
                    if (this.dragSrcIndex !== null && this.dragOverIndex !== null) {
                        const item = this.decks.splice(this.dragSrcIndex, 1)[0];
                        this.decks.splice(this.dragOverIndex, 0, item);
                        this.save();
                    }
                    this.dragSrcIndex = null; this.dragOverIndex = null;
                },
                deleteDeck(id) {
                    if(confirm("PERMANENTLY PURGE THIS DATASET?")) {
                        this.decks = this.decks.filter(d => d.id !== id);
                        if(this.activeDeck?.id === id) this.activeDeck = this.decks[0] || null;
                        this.save();
                    }
                },
                formatRawList(text) {
                    return text.split('\n').map(line => {
                        const match = line.match(/^(\d+)\x20+([^\[\(\-]+)/);
                        if (match) return `${match[1]} ${match[2].trim()}`;
                        return line;
                    }).join('\n');
                },
                async processImport(comp) {
                    if(!this.activeDeck || !comp.rawList.trim()) return;
                    comp.isProcessing = true;
                    const lines = comp.rawList.split('\n').filter(l => l.trim());
                    for(let line of lines) {
                        const match = line.match(/^(\d+)\x20+(.+)$/);
                        if(!match) continue;
                        let qty = parseInt(match[1]);
                        let searchStr = match[2].trim();
                        try {
                            const res = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(searchStr)}`);
                            const data = await res.json();
                            if(data.id) {
                                const existing = this.activeDeck.cards.find(c => c.id === data.id);
                                if(existing) existing.qty += qty;
                                else this.activeDeck.cards.push({...data, qty: qty, isCommander: false});
                            }
                            await new Promise(r => setTimeout(r, 100));
                        } catch(e) { console.error(e); }
                    }
                    this.save(); comp.rawList = ''; comp.isProcessing = false; comp.terminalOpen = false;
                },
                clean(n) { return n ? n.split(' // ')[0].replace(/[^\w\s]/gi, '').toLowerCase().trim() : ""; },
                getUsageStats(name) {
                    const target = this.clean(name);
                    const total = this.vault.reduce((s, v) => this.clean(v.name) === target ? s + v.qty : s, 0);
                    let used = 0;
                    this.decks.forEach(d => {
                        const c = d.cards.find(x => this.clean(x.name) === target);
                        if (c) used += c.qty;
                    });
                    return { total, avail: total - used };
                },
                getStatusIcon(card) { const s = this.getUsageStats(card.name); return s.total === 0 ? '✕' : (s.avail < 0 ? '!' : '✓'); },
                getStatusColor(card) { const s = this.getUsageStats(card.name); return s.total === 0 ? 'text-red-500' : (s.avail < 0 ? 'text-cyan-400' : 'text-green-400'); },
                getDeckPrice() { return (this.activeDeck?.cards?.reduce((s, c) => s + (parseFloat(c.prices?.usd || 0) * c.qty), 0) || 0).toFixed(2); },
                async searchCards() {
                    if(this.searchQuery.length < 2) { this.searchResults = []; return; }
                    const res = await fetch(`https://api.scryfall.com/cards/search?q=${encodeURIComponent(this.searchQuery)}`);
                    const d = await res.json(); this.searchResults = d.data?.slice(0, 10) || [];
                },
                addCardToDeck(res) {
                    const existing = this.activeDeck.cards.find(c => c.id === res.id);
                    if(existing) existing.qty++;
                    else this.activeDeck.cards.push({...res, qty: 1, isCommander: false});
                    this.searchQuery = ''; this.searchResults = []; this.save();
                },
                adjustQty(card, v) { card.qty += v; if(card.qty <= 0) this.activeDeck.cards = this.activeDeck.cards.filter(x => x.id !== card.id); this.save(); },
                getCardsByCat(cat) { 
                    if (cat === 'Commander') return this.activeDeck?.cards?.filter(c => c.isCommander) || [];
                    return this.activeDeck?.cards?.filter(c => c.type_line.includes(cat) && !c.isCommander) || []; 
                },
                countAllCards(d) { return d?.cards?.reduce((s, c) => s + c.qty, 0) || 0; },
                save() { localStorage.setItem('decks', JSON.stringify(this.decks)); },
                showPreview(e, url) { this.hoverPreview = { visible: true, url, x: e.clientX, y: e.clientY }; },
                hidePreview() { this.hoverPreview.visible = false; },
                createNewDeck() { const n = prompt("Terminal ID:"); if(n) { const d = {id: Date.now(), name: n, cards: []}; this.decks.push(d); this.activeDeck = d; this.save(); } }
            }
        }
    </script>
</body>
</html>
