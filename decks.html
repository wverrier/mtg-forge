<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>FORGE // DECKS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gunmetal: #111c1e; --dark: #1a2527; --cyan: #22d3ee; --steel: #8fa9b0; --orange: #fb923c; }
        body { background: var(--gunmetal); color: #e8eef0; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        .panel { background: var(--dark); border: 1px solid rgba(34, 211, 238, 0.1); }
        .brand-blue { color: rgb(34, 211, 238); }
        .scroll-v { overflow-y: auto; height: calc(100vh - 180px); scrollbar-width: thin; scrollbar-color: var(--cyan) transparent; }
        
        /* Status Indicators */
        .indicator { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .ind-synced { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }
        .ind-shared { background: var(--orange); box-shadow: 0 0 8px var(--orange); }
        .ind-missing { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
    </style>
</head>
<body x-data="deckApp()" x-init="init()">

    <header class="panel px-6 py-4 flex justify-between items-center border-b border-cyan-400/20 shadow-xl">
        <div class="flex items-center gap-6">
            <a href="index.html" class="text-3xl font-bold brand-blue" style="font-family: 'Bebas Neue'">FORGE // DECKS</a>
            <nav class="flex gap-4 text-[10px] font-bold uppercase tracking-widest text-steel">
                <a href="collection.html" class="hover:brand-blue transition">Vault</a>
                <a href="import.html" class="hover:brand-blue transition">Uplink</a>
            </nav>
        </div>
    </header>

    <main class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="panel p-6 scroll-v">
            <h2 class="text-xl font-bold brand-blue mb-4 uppercase italic">Active Strategy Units</h2>
            <div class="flex flex-col gap-2">
                <template x-for="deck in decks" :key="deck.id">
                    <div @click="selectedDeck = deck" 
                         :class="selectedDeck?.id === deck.id ? 'border-cyan-400 bg-cyan-400/5' : 'border-white/5'"
                         class="p-4 border cursor-pointer hover:border-cyan-400/50 transition flex justify-between items-center">
                        <div>
                            <p class="font-bold uppercase text-sm" x-text="deck.name"></p>
                            <p class="text-[10px] text-steel" x-text="deck.cards.length + ' Cards'"></p>
                        </div>
                        <div class="text-cyan-400 text-xs font-mono">>></div>
                    </div>
                </template>
            </div>
        </div>

        <div class="panel p-6 scroll-v">
            <template x-if="selectedDeck">
                <div>
                    <div class="flex justify-between items-start mb-6">
                        <h2 class="text-2xl font-bold brand-blue uppercase italic" x-text="selectedDeck.name"></h2>
                        <div class="flex gap-4 text-[9px] font-mono uppercase text-steel">
                            <span><i class="indicator ind-synced mr-1"></i> Ready</span>
                            <span><i class="indicator ind-shared mr-1"></i> Shared</span>
                            <span><i class="indicator ind-missing mr-1"></i> Null</span>
                        </div>
                    </div>

                    <div class="flex flex-col gap-1">
                        <template x-for="card in selectedDeck.cards" :key="card.name">
                            <div class="flex justify-between items-center p-2 bg-black/20 border border-white/5 text-xs">
                                <div class="flex items-center gap-3">
                                    <i :class="getStatusClass(card.name)" class="indicator"></i>
                                    <span class="font-bold uppercase" x-text="card.name"></span>
                                </div>
                                <div class="flex items-center gap-4 font-mono text-[10px]">
                                    <span class="text-steel">VLT: <span class="text-white" x-text="getVaultQty(card.name)"></span></span>
                                    <span class="text-steel">QTY: <span class="brand-blue" x-text="card.qty || 1"></span></span>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </template>
            <template x-if="!selectedDeck">
                <div class="h-full flex items-center justify-center opacity-20">
                    <p class="text-xl italic font-bold uppercase">Select Project to Inspect</p>
                </div>
            </template>
        </div>
    </main>

    <script>
        function deckApp() {
            return {
                vault: JSON.parse(localStorage.getItem('forge_vault') || '[]'),
                decks: JSON.parse(localStorage.getItem('forge_decks') || '[]'),
                selectedDeck: null,

                init() {
                    if (this.decks.length > 0) this.selectedDeck = this.decks[0];
                },

                // CLEAN NAME MATCHING (Solves the Altair / Showcase name mismatch)
                getCleanName(name) {
                    return name.split('(')[0].trim().toLowerCase();
                },

                getVaultQty(name) {
                    const clean = this.getCleanName(name);
                    const match = this.vault.find(v => this.getCleanName(v.name) === clean);
                    return match ? match.qty : 0;
                },

                getStatusClass(name) {
                    const clean = this.getCleanName(name);
                    const vQty = this.getVaultQty(name);
                    
                    if (vQty === 0) return 'ind-missing';

                    // Calculate total usage across ALL decks for "Shared" status
                    let totalUsed = 0;
                    this.decks.forEach(d => {
                        const found = d.cards.find(c => this.getCleanName(c.name) === clean);
                        if (found) totalUsed += (found.qty || 1);
                    });

                    return vQty >= totalUsed ? 'ind-synced' : 'ind-shared';
                }
            }
        }
    </script>
</body>
</html>
