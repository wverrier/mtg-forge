<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORGE // MOXFIELD UPLINK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gunmetal: #111c1e; --dark: #1a2527; --cyan: #4dd9f0; }
        body { background: var(--gunmetal); color: #e8eef0; font-family: 'Rajdhani', sans-serif; min-height: 100vh; }
        .panel { background: var(--dark); border: 1px solid rgba(77,217,240,0.1); }
        textarea { background: rgba(0,0,0,0.3) !important; border: 1px solid rgba(77,217,240,0.2) !important; color: #4dd9f0 !important; font-family: monospace; }
        .btn-primary { background: transparent; border: 1px solid var(--cyan); color: var(--cyan); font-family: 'Bebas Neue'; transition: 0.2s; }
        .btn-primary:hover { background: var(--cyan); color: var(--gunmetal); box-shadow: 0 0 15px var(--cyan); }
    </style>
</head>
<body x-data="moxfieldTranslator()">

    <div class="max-w-4xl mx-auto py-12 px-6">
        <header class="mb-12 border-b border-cyan-400/20 pb-6 flex justify-between items-end">
            <div>
                <h1 class="text-5xl font-bold text-cyan-400 italic" style="font-family: 'Bebas Neue'">MOXFIELD // COLLECTION UPLINK</h1>
                <p class="text-slate-400 text-sm tracking-widest uppercase">Format: [Count] [Name] [[Set]] [Collector Number/Extras]</p>
            </div>
            <a href="index.html" class="text-xs text-cyan-400 hover:underline mb-2">← Back to Terminal</a>
        </header>

        <div class="grid gap-8">
            <div class="panel p-6">
                <label class="block text-xs font-bold text-cyan-400 mb-2 uppercase tracking-tighter">Raw Data Input</label>
                <textarea x-model="rawInput" rows="8" class="w-full p-4 rounded focus:outline-none focus:border-cyan-400" 
                    placeholder="1 Mountain (0192) [SPM] 96&#10;1 Appa, Steadfast Guardian (Borderless) [TLA]&#10;1 Mountain (0575) (Surge Foil) [FIN] 575"></textarea>
            </div>

            <div class="flex justify-center">
                <button @click="processData()" class="btn-primary px-12 py-3 text-xl uppercase italic">Process for CSV</button>
            </div>

            <div class="panel p-6" x-show="csvOutput">
                <div class="flex justify-between items-center mb-2">
                    <label class="text-xs font-bold text-cyan-400 uppercase tracking-tighter">CSV Output (Moxfield Format)</label>
                    <button @click="downloadCSV()" class="text-[10px] text-white bg-white/10 px-2 py-1 hover:bg-cyan-400 hover:text-black">Download .CSV</button>
                </div>
                <textarea x-model="csvOutput" readonly rows="8" class="w-full p-4 rounded opacity-80 text-sm"></textarea>
            </div>
        </div>

        <footer class="mt-12 opacity-20 font-mono text-[10px] text-center tracking-[0.5em] uppercase">
            Data Scrubbing Active // CSV-RFC4180 Compliant
        </footer>
    </div>

    <script>
        function moxfieldTranslator() {
            return {
                rawInput: '',
                csvOutput: '',
                
                processData() {
                    if (!this.rawInput.trim()) {
                        alert("Please input raw card data first.");
                        return;
                    }

                    const lines = this.rawInput.split('\n');
                    let csvRows = ['Count,Name,Edition,Condition,Language,Foil,Collector Number'];
                    
                    lines.forEach(line => {
                        const trimmedLine = line.trim();
                        if (!trimmedLine) return;

                        // Step 1: Extract Count (the leading digit)
                        const countMatch = trimmedLine.match(/^(\d+)\s+/);
                        if (!countMatch) return; // Skip lines that don't start with a number
                        
                        const count = countMatch[1];
                        let remainder = trimmedLine.substring(countMatch[0].length).trim();

                        // Step 2: Extract Set Code inside brackets, e.g., [SPM]
                        const setMatch = remainder.match(/\[(.*?)\]/);
                        if (!setMatch) return; // Skip if no set code

                        const set = setMatch[1].trim();
                        
                        // Split line into left-of-set (name + details) and right-of-set (collector number + finishes)
                        const setIndex = remainder.indexOf(setMatch[0]);
                        let rawNamePart = remainder.substring(0, setIndex).trim();
                        let rawExtraPart = remainder.substring(setIndex + setMatch[0].length).trim();

                        // Step 3: Scrub Name (Remove any parenthesis elements like (0192) or (Borderless))
                        // We also detect if any of these stripped parentheticals are collector numbers
                        let collectorNum = '';
                        let isFoil = '';

                        // Look for numeric codes in parentheticals inside the name part, e.g., "Mountain (0192)"
                        const parentheticalNumMatch = rawNamePart.match(/\((\d+)\)/);
                        if (parentheticalNumMatch) {
                            collectorNum = parentheticalNumMatch[1];
                        }

                        // Strip all parenthesis blocks from the name
                        let cleanName = rawNamePart.replace(/\s*\([^)]*\)/g, '').trim();

                        // Step 4: Parse the Extra Part (after the set code)
                        if (rawExtraPart) {
                            // Check for foil signifiers
                            if (/foil/i.test(rawExtraPart)) {
                                isFoil = 'foil';
                            }
                            
                            // Extract numbers if we haven't found a collector number yet
                            const numberMatch = rawExtraPart.match(/\b\d+\b/);
                            if (numberMatch && !collectorNum) {
                                collectorNum = numberMatch[0];
                            }
                        }

                        // Escape quotes for CSV safety
                        const finalName = `"${cleanName.replace(/"/g, '""')}"`;
                        
                        // Default properties Moxfield accepts
                        const condition = 'Near Mint';
                        const language = 'English';

                        csvRows.push(`${count},${finalName},${set},${condition},${language},${isFoil},${collectorNum}`);
                    });

                    this.csvOutput = csvRows.join('\n');
                },

                downloadCSV() {
                    if (!this.csvOutput) return;
                    const blob = new Blob([this.csvOutput], { type: 'text/csv;charset=utf-8;' });
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.setAttribute('hidden', '');
                    a.setAttribute('href', url);
                    a.setAttribute('download', 'moxfield_collection_import.csv');
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                }
            }
        }
    </script>
</body>
</html>
