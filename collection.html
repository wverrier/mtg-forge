<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>FORGE // VAULT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gunmetal: #111c1e; --dark: #1a2527; --cyan: #4dd9f0; }
        body { background: var(--gunmetal); color: #e8eef0; font-family: 'Rajdhani', sans-serif; }
        .panel { background: var(--dark); border: 1px solid rgba(77,217,240,0.1); }
        .card-row:hover { background: rgba(77,217,240,0.05); border-left: 2px solid var(--cyan); }
        .card-preview-float { position: fixed; z-index: 3000; width: 250px; pointer-events: none; border-radius: 12px; }
    </style>
</head>
<body x-data="vaultApp()">
    <img x-show="hoverPreview.visible" :src="hoverPreview.url" class="card-preview-float shadow-2xl" :style="`left:${hoverPreview.x+20}px; top:${hoverPreview.y-120}px`" />

    <header class="panel px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <a href="index.html" class="text-2xl font-bold text-cyan-400" style="font-family: 'Bebas Neue'">FORGE // VAULT</a>
        <nav class="flex gap-4 text-[10px] font-bold uppercase tracking-widest">
            <a href="decks.html" class="hover:text-cyan-400">Decks</a>
            <a href="import.html" class="hover:text-cyan-400">Uplink</a>
        </nav>
    </header>

    <main class="p-8">
        <div class="flex justify-between items-end mb-10">
            <div>
                <h2 class="text-5xl font-bold uppercase italic">Owned Manifest</h2>
                <p class="text-cyan-400 font-mono text-sm" x-text="cards.length + ' ENTRIES'"></p>
            </div>
            <input type="text" x-model="filter" placeholder="FILTER VAULT..." class="bg-black/40 border border-white/10 px-4 py-2 text-sm font-mono focus:border-cyan-400 outline-none w-80">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-x-8 gap-y-1">
            <template x-for="card in filteredCards" :key="card.name">
                <div class="card-row flex justify-between items-center px-3 py-1.5 cursor-crosshair group transition-all"
                     @mouseenter="showPreview($event, card)" @mouseleave="hidePreview()">
                    <div class="flex items-center gap-3">
                        <span class="text-cyan-400 font-mono text-xs" x-text="card.qty + 'x'"></span>
                        <span class="font-bold text-sm uppercase truncate" x-text="card.name"></span>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <script>
        function vaultApp() {
            return {
                cards: JSON.parse(localStorage.getItem('forge_vault') || '[]'),
                filter: '', hoverPreview: { visible: false, url: '', x: 0, y: 0 },
                get filteredCards() {
                    return this.cards.filter(c => c.name.toLowerCase().includes(this.filter.toLowerCase()));
                },
                showPreview(e, card) {
                    const url = card.set && card.number ? 
                        `https://api.scryfall.com/cards/${card.set}/${card.number}?format=image` : 
                        `https://api.scryfall.com/cards/named?exact=${encodeURIComponent(card.name)}&format=image`;
                    this.hoverPreview = { visible: true, url, x: e.clientX, y: e.clientY };
                },
                hidePreview() { this.hoverPreview.visible = false; }
            }
        }
    </script>
</body>
</html>
