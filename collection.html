<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORGE — Vault Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gunmetal-deeper: #111c1e;
            --gunmetal-dark: #1a2527;
            --accent-cyan: #4dd9f0;
            --steel: #8fa9b0;
        }
        body {
            background: var(--gunmetal-deeper);
            color: #e8eef0;
            font-family: 'Rajdhani', sans-serif;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(77,217,240,0.02) 39px, rgba(77,217,240,0.02) 40px);
        }
        .panel { background: var(--gunmetal-dark); border: 1px solid rgba(77,217,240,0.1); }
        .card-art { width: 100%; aspect-ratio: 2/2.8; object-fit: cover; border-radius: 8px; transition: 0.3s; }
        .card-art:hover { transform: scale(1.05); border: 1px solid var(--accent-cyan); box-shadow: 0 0 15px rgba(77,217,240,0.3); }
    </style>
</head>
<body x-data="collectionApp()">

    <header class="panel border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-3xl font-bold tracking-tighter text-cyan-400" style="font-family: 'Bebas Neue'">FORGE // VAULT</h1>
        <nav class="flex gap-6">
            <a href="index.html" class="text-xs font-bold uppercase tracking-widest hover:text-cyan-400">← Back to Deck Builder</a>
        </nav>
    </header>

    <main class="p-8">
        <div class="flex justify-between items-end mb-10">
            <div>
                <h2 class="text-5xl font-bold uppercase italic">Owned Inventory</h2>
                <p class="text-cyan-400 font-mono text-sm mt-2" x-text="cards.length + ' UNIQUE ENTRIES DETECTED'"></p>
            </div>
        </div>

        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
            <template x-for="card in cards" :key="card.name">
                <div class="group">
                    <img :src="`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(card.name)}&format=image&version=normal`" 
                         class="card-art bg-black/40" 
                         loading="lazy" />
                    <div class="mt-3 px-1">
                        <p class="text-xs font-bold truncate uppercase tracking-tight" x-text="card.name"></p>
                        <div class="flex justify-between items-center mt-1">
                            <span class="text-[10px] text-cyan-400 font-mono" x-text="'QTY: ' + card.qty"></span>
                            <span class="text-[10px] text-steel" x-text="card.set"></span>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <div x-show="cards.length === 0" class="text-center py-40 panel">
            <p class="text-steel uppercase tracking-widest">Vault is currently empty. Please import your CSV in the main terminal.</p>
            <a href="index.html" class="inline-block mt-4 text-cyan-400 border border-cyan-400 px-4 py-2 text-xs font-bold">RETURN TO TERMINAL</a>
        </div>
    </main>

    <script>
        function collectionApp() {
            return {
                // This pulls the data saved from your index.html page
                cards: JSON.parse(localStorage.getItem('forge_vault') || '[]'),
            }
        }
    </script>
</body>
</html>
