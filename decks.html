<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>FORGE // DECK STRATEGIST</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gunmetal: #111c1e; --dark: #1a2527; --cyan: #22d3ee; --steel: #8fa9b0; --orange: #fb923c; }
        body { background: var(--gunmetal); color: #e8eef0; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        .panel { background: var(--dark); border: 1px solid rgba(34, 211, 238, 0.1); }
        .brand-blue { color: rgb(34, 211, 238); }
        .status-icon { font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 2px; }
        .status-available { background: rgba(34, 211, 238, 0.2); color: var(--cyan); border: 1px solid var(--cyan); }
        .status-shared { background: rgba(251, 146, 60, 0.2); color: var(--orange); border: 1px solid var(--orange); }
        .status-missing { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
    </style>
</head>
<body x-data="deckApp()" x-init="init()">

    <header class="panel px-6 py-4 flex justify-between items-center border-b border-cyan-400/20 shadow-xl">
        <div class="flex items-center gap-6">
            <a href="index.html" class="text-3xl font-bold brand-blue" style="font-family: 'Bebas Neue'">FORGE // DECKS</a>
            <nav class="flex gap-4 text-[10px] font-bold uppercase tracking-widest text-steel">
                <a href="collection.html" class="hover:brand-blue transition">Vault</a>
                <a href="import.html" class="hover:brand-blue transition">Uplink</a>
            </nav>
        </div>
    </header>

    <main class="p-8 grid grid-cols-12 gap-6 h-[calc(100vh-100px)]">
        <div class="col-span-4 panel p-6 flex flex-col gap-4 overflow-y-auto">
            <h2 class="text-xl font-bold brand-blue italic uppercase tracking-tighter">Active Projects</h2>
            <template x-for="deck in decks" :key="deck.id">
                <button @click="selectDeck(deck)" 
                        :class="selectedDeck?.id === deck.id ? 'border-cyan-400 bg-cyan-400/5' : 'border-white/5'"
                        class="panel p-4 text-left hover:border-cyan-400/50 transition">
                    <p class="font-bold uppercase" x-text="deck.name"></p>
                    <p class="text-[10px] text-steel" x-text="deck.cards.length + ' CARDS'"></p>
                </button>
            </template>
        </div>

        <div class="col-span-8 panel p-6 flex flex-col overflow-hidden">
            <template x-if="selectedDeck">
                <div class="flex flex-col h-full">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-3xl font-bold italic brand-blue uppercase" x-text="selectedDeck.name"></h2>
                        <div class="text-[10px] font-mono text-steel">AVAILABILITY HUD ENABLED</div>
                    </div>

                    <div class="overflow-y-auto pr-2">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="text-[10px] text-steel uppercase tracking-widest border-b border-white/5">
                                    <th class="py-2">Unit Name</th>
                                    <th>Status</th>
                                    <th>Vault Context</th>
                                </tr>
                            </thead>
                            <tbody class="text-xs">
                                <template x-for="card in selectedDeck.cards" :key="card.name">
                                    <tr class="border-b border-white/5 hover:bg-white/5 transition">
                                        <td class="py-3 font-bold uppercase" x-text="card.name"></td>
                                        <td>
                                            <span x-show="getAvailability(card.name).status === 'available'" class="status-icon status-available">SYNCED</span>
                                            <span x-show="getAvailability(card.name).status === 'shared'" class="status-icon status-shared">SHARED</span>
                                            <span x-show="getAvailability(card.name).status === 'missing'" class="status-icon status-missing">NULL</span>
                                        </td>
                                        <td class="font-mono text-[10px] text-steel">
                                            VLT: <span class="text-white" x-text="getAvailability(card.name).vaultQty"></span> | 
                                            USED: <span class="text-white" x-text="getAvailability(card.name).totalUsed"></span>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <script>
        function deckApp() {
            return {
                vault: JSON.parse(localStorage.getItem('forge_vault') || '[]'),
                decks: JSON.parse(localStorage.getItem('forge_decks') || '[]'),
                selectedDeck: null,

                init() {
                    if (this.decks.length > 0) this.selectedDeck = this.decks[0];
                },

                selectDeck(deck) { this.selectedDeck = deck; },

                getAvailability(cardName) {
                    // Clean name check for Altair-style issues
                    const cleanName = cardName.split('(')[0].trim().toLowerCase();
                    
                    const vaultCard = this.vault.find(v => v.name.toLowerCase().includes(cleanName));
                    const vaultQty = vaultCard ? vaultCard.qty : 0;

                    // Calculate total usage across ALL decks
                    let totalUsed = 0;
                    this.decks.forEach(d => {
                        const found = d.cards.find(c => c.name.toLowerCase().includes(cleanName));
                        if (found) totalUsed += (found.qty || 1);
                    });

                    if (vaultQty === 0) return { status: 'missing', vaultQty: 0, totalUsed };
                    if (vaultQty >= totalUsed) return { status: 'available', vaultQty, totalUsed };
                    return { status: 'shared', vaultQty, totalUsed };
                }
            }
        }
    </script>
</body>
</html>
