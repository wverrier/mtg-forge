<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>FORGE // UPLINK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gunmetal: #111c1e; --dark: #1a2527; --cyan: #4dd9f0; }
        body { background: var(--gunmetal); color: #e8eef0; font-family: 'Rajdhani', sans-serif; }
        .panel { background: var(--dark); border: 1px solid rgba(77,217,240,0.1); }
        .btn-primary { border: 1px solid var(--cyan); color: var(--cyan); padding: 1rem; text-transform: uppercase; font-weight: 700; clip-path: polygon(0 0, 95% 0, 100% 25%, 100% 100%, 5% 100%, 0 75%); transition: 0.2s; }
        .btn-primary:hover { background: var(--cyan); color: black; }
        
        /* Modal Styling */
        .modal-overlay { background: rgba(17, 28, 30, 0.9); backdrop-filter: blur(4px); }
        .glitch-border { border: 1px solid var(--cyan); box-shadow: 0 0 15px rgba(77,217,240,0.2); }
    </style>
</head>
<body x-data="importApp()">
    <header class="panel px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <a href="index.html" class="text-2xl font-bold text-cyan-400" style="font-family: 'Bebas Neue'">FORGE // UPLINK</a>
        <nav class="flex gap-4 text-[10px] font-bold uppercase tracking-widest">
            <a href="decks.html" class="hover:text-cyan-400">Decks</a>
            <a href="collection.html" class="hover:text-cyan-400">Vault</a>
        </nav>
    </header>

    <main class="max-w-4xl mx-auto p-12">
        <div class="panel p-10">
            <h2 class="text-4xl font-bold uppercase italic mb-2 text-cyan-400" style="font-family: 'Bebas Neue'">Data Uplink</h2>
            <p class="text-slate-500 font-mono text-xs mb-8">FORMAT: [QTY] [NAME] [[SET]] [NUMBER]</p>
            
            <textarea x-model="raw" placeholder="1 Sol Ring [CC2] 405..." class="w-full h-80 bg-black/40 border border-white/10 p-6 font-mono text-sm focus:border-cyan-400 outline-none mb-6"></textarea>
            
            <button @click="initiateSync()" class="w-full btn-primary text-xl">Initialize Vault Sync</button>
        </div>
    </main>

    <div x-show="showModal" x-transition class="fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-6" style="display: none;">
        <div class="panel max-w-md w-full p-8 glitch-border">
            <h3 class="text-2xl font-bold text-cyan-400 mb-4" style="font-family: 'Bebas Neue'">CONFLICT DETECTED</h3>
            <p class="text-sm text-slate-300 mb-6 leading-relaxed">The system has detected an existing manifest in Local Storage. How should the new data be integrated?</p>
            
            <div class="flex flex-col gap-3">
                <button @click="processSync('append')" class="w-full bg-cyan-400/10 border border-cyan-400/50 p-3 text-xs font-bold uppercase tracking-widest hover:bg-cyan-400 hover:text-black transition">
                    Append (Merge & Update Quantities)
                </button>
                <button @click="processSync('overwrite')" class="w-full bg-red-500/10 border border-red-500/50 p-3 text-xs font-bold uppercase tracking-widest hover:bg-red-500 hover:text-white transition">
                    Overwrite (Wipe Existing Data)
                </button>
                <button @click="showModal = false" class="w-full text-[10px] text-slate-500 uppercase tracking-widest mt-2 hover:text-white transition">
                    Cancel Operation
                </button>
            </div>
        </div>
    </div>

    <script>
        function importApp() {
            return {
                raw: '',
                showModal: false,
                parsedCards: [],

                initiateSync() {
                    if(!this.raw.trim()) return;
                    
                    // Parse the raw text first
                    const lines = this.raw.trim().split('\n');
                    this.parsedCards = [];
                    
                    lines.forEach(l => {
                        const m = l.match(/^(\d+)\s+(.+?)\s+\[(.+?)\]\s+(\d+)$/) || l.match(/^(\d+)\s+(.+)$/);
                        if(m) {
                            this.parsedCards.push({ 
                                qty: parseInt(m[1]), 
                                name: m[2].trim(), 
                                set: m[3]?.toLowerCase() || '', 
                                number: m[4] || '' 
                            });
                        }
                    });

                    // Check if vault already exists
                    const existing = localStorage.getItem('forge_vault');
                    if (existing && JSON.parse(existing).length > 0) {
                        this.showModal = true;
                    } else {
                        this.processSync('overwrite');
                    }
                },

                processSync(mode) {
                    let finalVault = [];
                    
                    if (mode === 'overwrite') {
                        finalVault = this.parsedCards;
                    } else if (mode === 'append') {
                        const existingVault = JSON.parse(localStorage.getItem('forge_vault') || '[]');
                        
                        // Merge logic: find duplicates and add quantities
                        this.parsedCards.forEach(newCard => {
                            const match = existingVault.find(e => 
                                e.name.toLowerCase() === newCard.name.toLowerCase() && 
                                e.set === newCard.set
                            );
                            
                            if (match) {
                                match.qty += newCard.qty;
                            } else {
                                existingVault.push(newCard);
                            }
                        });
                        finalVault = existingVault;
                    }

                    localStorage.setItem('forge_vault', JSON.stringify(finalVault));
                    this.showModal = false;
                    window.location.href = 'collection.html';
                }
            }
        }
    </script>
</body>
</html>
