<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>FORGE // UPLINK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gunmetal: #111c1e; --dark: #1a2527; --cyan: #22d3ee; --steel: #8fa9b0; }
        body { background: var(--gunmetal); color: #e8eef0; font-family: 'Rajdhani', sans-serif; }
        .panel { background: var(--dark); border: 1px solid rgba(34, 211, 238, 0.1); }
        .brand-blue { color: rgb(34, 211, 238); }
        .btn-primary { border: 1px solid var(--cyan); color: var(--cyan); padding: 0.8rem; text-transform: uppercase; font-weight: 700; clip-path: polygon(0 0, 95% 0, 100% 25%, 100% 100%, 5% 100%, 0 75%); transition: 0.2s; cursor: pointer; }
        .btn-primary:hover { background: var(--cyan); color: black; }
    </style>
</head>
<body x-data="importApp()">

    <header class="panel px-6 py-4 flex justify-between items-center border-b border-cyan-400/20 shadow-xl">
        <div class="flex items-center gap-6">
            <a href="index.html" class="text-3xl font-bold brand-blue" style="font-family: 'Bebas Neue'">FORGE // UPLINK</a>
            <nav class="flex gap-4 text-[10px] font-bold uppercase tracking-widest text-steel">
                <a href="collection.html" class="hover:brand-blue transition">Vault</a>
                <a href="decks.html" class="hover:brand-blue transition">Decks</a>
            </nav>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-12">
        <div class="panel p-8 flex flex-col gap-6">
            <h2 class="text-2xl font-bold italic tracking-tighter brand-blue uppercase">Bulk Inventory Ingest</h2>
            <p class="text-xs text-steel leading-relaxed">Paste your raw inventory list below. <br>Format: <span class="text-white">1 Card Name</span></p>
            
            <textarea x-model="rawInput" class="w-full h-80 bg-black/40 border border-white/10 p-4 font-mono text-xs focus:border-cyan-400 outline-none text-cyan-100" placeholder="1 Sol Ring&#10;4 Counterspell..."></textarea>
            
            <div class="flex justify-between items-center">
                <div x-show="processing" class="text-xs italic animate-pulse brand-blue">SYNCING WITH DATABASE...</div>
                <button @click="processImport()" :disabled="processing" class="btn-primary px-12 ml-auto">Initialise Ingest</button>
            </div>
        </div>
    </main>

    <script>
        function importApp() {
            return {
                rawInput: '', processing: false,
                async processImport() {
                    this.processing = true;
                    const lines = this.rawInput.split('\n');
                    let vault = JSON.parse(localStorage.getItem('forge_vault') || '[]');

                    for(let line of lines) {
                        const match = line.match(/^(\d+)\s+(.+)$/);
                        if(match) {
                            const qty = parseInt(match[1]);
                            const name = match[2].trim();
                            
                            let existing = vault.find(c => c.name.toLowerCase() === name.toLowerCase());
                            if(existing) {
                                existing.qty += qty;
                            } else {
                                vault.push({ name, qty, type: 'Imported' });
                            }
                        }
                    }

                    localStorage.setItem('forge_vault', JSON.stringify(vault));
                    alert("INGEST COMPLETE. DATA SYNCED TO VAULT.");
                    this.rawInput = '';
                    this.processing = false;
                }
            }
        }
    </script>
</body>
</html>
