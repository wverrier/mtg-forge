<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORGE // MAIN TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gunmetal: #111c1e; --dark: #1a2527; --cyan: #4dd9f0; }
        body {
            background: var(--gunmetal); color: #e8eef0; font-family: 'Rajdhani', sans-serif;
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(77,217,240,0.02) 39px, rgba(77,217,240,0.02) 40px);
            margin: 0;
            overflow: hidden;
        }
        .menu-card {
            background: var(--dark); border: 1px solid rgba(77,217,240,0.1);
            transition: 0.3s; position: relative; cursor: pointer;
            text-decoration: none;
        }
        .menu-card:hover {
            border-color: var(--cyan); background: rgba(77,217,240,0.05);
            transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .glitch-sub {
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: var(--cyan);
            opacity: 0.6;
            margin-bottom: 0.5rem;
            display: block;
        }
    </style>
</head>
<body>
    <div class="max-w-6xl w-full px-6 text-center">
        <h1 class="text-7xl font-bold tracking-tighter text-cyan-400 mb-16" style="font-family: 'Bebas Neue'">FORGE SYSTEM v1.0</h1>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
            
            <a href="decks.html" class="menu-card p-8 group">
                <span class="glitch-sub uppercase font-mono">Module_01</span>
                <h2 class="text-4xl font-bold uppercase italic mb-2 text-white" style="font-family: 'Bebas Neue'">Decks</h2>
                <p class="text-slate-400 text-sm">Construct and optimize lists.</p>
            </a>

            <a href="collection.html" class="menu-card p-8 group">
                <span class="glitch-sub uppercase font-mono">Module_02</span>
                <h2 class="text-4xl font-bold uppercase italic mb-2 text-white" style="font-family: 'Bebas Neue'">Vault</h2>
                <p class="text-slate-400 text-sm">Manage owned inventory.</p>
            </a>

            <a href="playtest.html" class="menu-card p-8 group border-cyan-400/40 bg-cyan-400/5">
                <span class="glitch-sub uppercase font-mono animate-pulse">Neural_Link</span>
                <h2 class="text-4xl font-bold uppercase italic mb-2 text-cyan-400" style="font-family: 'Bebas Neue'">Playtest</h2>
                <p class="text-slate-400 text-sm">Combat simulation environment.</p>
            </a>

            <a href="import.html" class="menu-card p-8 group">
                <span class="glitch-sub uppercase font-mono">Module_03</span>
                <h2 class="text-4xl font-bold uppercase italic mb-2 text-white" style="font-family: 'Bebas Neue'">Uplink</h2>
                <p class="text-slate-400 text-sm">Import card data lists.</p>
            </a>

        </div>
        
        <footer class="mt-16 opacity-20 font-mono text-[10px] tracking-[0.5em] uppercase">
            System Status: Optimal // Connection Encrypted
        </footer>
    </div>
</body>
</html>
