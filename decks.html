<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FORGE // TACTICAL BUILDER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gunmetal: #111c1e; --dark: #1a2527; --cyan: #22d3ee; --steel: #8fa9b0; --warn: #eb5f7a; --ok: #4ade80; }
        
        [x-cloak] { display: none !important; }

        body { background: var(--gunmetal); color: #e8eef0; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        .panel { background: var(--dark); border: 1px solid rgba(34, 211, 238, 0.1); }
        
        /* Cursor logic for sidebar focus */
        .sidebar-active { cursor: none !important; }
        #custom-cursor {
            width: 16px; height: 16px; border: 1px solid var(--cyan); border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 9999;
            transition: transform 0.1s ease-out, background 0.2s;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 8px rgba(34, 211, 238, 0.3);
            display: none; 
        }
        .sidebar-active #custom-cursor { display: block; }

        .btn-primary { border: 1px solid var(--cyan); color: var(--cyan); padding: 0.5rem; text-transform: uppercase; font-weight: 700; clip-path: polygon(0 0, 92% 0, 100% 25%, 100% 100%, 8% 100%, 0 75%); transition: 0.2s; }
        .btn-primary:hover { background: var(--cyan); color: black; }
        
        .card-preview-float { position: fixed; z-index: 3000; width: 240px; pointer-events: none; border-radius: 12px; border: 1px solid rgba(34, 211, 238, 0.3); }
        .category-header { font-family: 'Bebas Neue'; letter-spacing: 2px; color: var(--steel); border-bottom: 1px solid rgba(34, 211, 238, 0.2); margin-bottom: 16px; padding-bottom: 4px; text-transform: uppercase; }
        .scroll-v { overflow-y: auto; height: calc(100vh - 350px); scrollbar-width: thin; scrollbar-color: var(--cyan) transparent; }
        .brand-blue { color: rgb(34, 211, 238); }
        
        /* HUD & Status Elements */
        .hud-block { font-family: 'Bebas Neue'; padding: 3px 10px; font-size: 10px; border-radius: 4px; letter-spacing: 1px; transition: 0.2s; border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-cmdr-mini { font-family: 'Bebas Neue'; padding: 1px 6px; font-size: 8px; border-radius: 3px; letter-spacing: 0.5px; transition: 0.2s; border: 1px solid rgba(255, 255, 255, 0.1); }

        .cmdr-inactive { background: rgba(255, 255, 255, 0.05); color: rgba(255, 255, 255, 0.4); }
        .cmdr-active { background: var(--cyan); color: black; border-color: var(--cyan); box-shadow: 0 0 10px rgba(34, 211, 238, 0.3); }

        .avail-counter { background: rgba(255, 255, 255, 0.05); color: var(--steel); }
        .avail-counter.deficit { background: rgba(235, 95, 122, 0.2); color: var(--warn); border-color: rgba(235, 95, 122, 0.3); }
        
        .search-results-container { position: fixed; background: rgba(17, 28, 30, 0.98); border: 1px solid rgba(34, 211, 238, 0.4); z-index: 5000; margin-top: 5px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); backdrop-filter: blur(15px); max-height: 400px; overflow-y: auto; }

        /* Visual Grid */
        .visual-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .visual-card { width: 100%; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .is-cmdr { border: 2px solid var(--cyan); box-shadow: 0 0 15px rgba(34, 211, 238, 0.4); }

        /* Bulk Uplink Terminal */
        .import-banner { position: fixed; bottom: 0; right: 20px; width: 400px; z-index: 4000; border: 1px solid rgba(34, 211, 238, 0.3); border-bottom: none; background: rgba(17, 28, 30, 0.95); backdrop-filter: blur(10px); transition: transform 0.3s; }
        .import-banner.collapsed { transform: translateY(calc(100% - 32px)); }
    </style>
</head>
<body x-data="deckApp()" x-init="init()" @mousemove="moveCursor($event)" :class="{'sidebar-active': inSidebar}">
    
    <div id="custom-cursor"></div>
    <img x-show="hoverPreview.visible && viewMode === 'list'" :src="hoverPreview.url" class="card-preview-float shadow-2xl" :style="`left:${hoverPreview.x+20}px; top:${hoverPreview.y-120}px`" />

    <header class="panel px-6 py-4 flex justify-between items-center border-b border-cyan-400/20">
        <div class="flex items-center gap-8">
            <a href="index.html" class="text-3xl font-bold brand-blue" style="font-family: 'Bebas Neue'">FORGE // DECKS</a>
            <nav class="flex gap-6 text-[11px] font-bold uppercase tracking-widest text-steel">
                <a href="collection.html" class="hover:brand-blue transition">Vault</a>
                <a href="index.html" class="hover:brand-blue transition">Dashboard</a>
            </nav>
        </div>
        <div class="flex gap-2">
            <button @click="viewMode = 'list'" :class="viewMode === 'list' ? 'bg-cyan-400 text-black' : 'bg-white/5 text-steel'" class="px-4 py-1.5 text-[10px] font-bold uppercase transition">List View</button>
            <button @click="viewMode = 'visual'" :class="viewMode === 'visual' ? 'bg-cyan-400 text-black' : 'bg-white/5 text-steel'" class="px-4 py-1.5 text-[10px] font-bold uppercase transition">Visual View</button>
        </div>
    </header>

    <main class="grid grid-cols-12 gap-4 p-4 h-[calc(100vh-80px)]">
        <div class="col-span-2 panel p-4 flex flex-col" @mouseenter="inSidebar = true" @mouseleave="inSidebar = false">
            <button @click="createNewDeck()" class="w-full btn-primary text-xs mb-6">+ Initialise List</button>
            <div class="flex-1 overflow-y-auto">
                <template x-for="deck in decks" :key="deck.id">
                    <div @click="activeDeck = deck" :class="activeDeck?.id === deck.id ? 'border-cyan-400 bg-cyan-400/5' : 'border-transparent opacity-60'" class="p-3 border-l-2 transition hover:opacity-100 cursor-pointer mb-2">
                        <div x-text="deck.name" class="font-bold text-sm uppercase truncate"></div>
                        <div class="text-[9px] font-mono brand-blue" x-text="countAllCards(deck) + ' UNITS'"></div>
                    </div>
                </template>
            </div>
        </div>

        <div class="col-span-10 flex flex-col gap-4" x-show="activeDeck" x-cloak>
            <div class="panel p-6 grid grid-cols-3 items-center gap-4 relative overflow-hidden">
                <div class="absolute top-[-20px] right-1/2 translate-x-1/2 opacity-5 font-mono text-[120px] leading-none select-none brand-blue" x-text="countAllCards(activeDeck)"></div>
                <h2 class="text-4xl font-bold uppercase italic truncate" x-text="activeDeck.name"></h2>
                <div class="flex flex-col items-center justify-center border-x border-white/5 h-full">
                    <p class="text-[10px] text-steel uppercase tracking-[0.3em] mb-1">Combat Readiness</p>
                    <div class="flex gap-6 font-mono text-sm brand-blue font-bold">
                        <span>COUNT: <span x-text="countAllCards(activeDeck)"></span></span>
                        <span>VALUE: <span class="text-white">$<span x-text="getDeckPrice()"></span></span></span>
                    </div>
                </div>
                <div class="flex flex-col items-end gap-2 relative" x-ref="searchWrapper">
                    <input type="text" x-model="searchQuery" @input.debounce.500ms="searchCards()" placeholder="QUERY DATABASE..." class="w-full max-w-[280px] bg-black/40 border border-cyan-400/20 p-2 text-xs font-mono focus:border-cyan-400 outline-none">
                    <div x-show="searchResults.length > 0" @click.away="searchResults = []" class="search-results-container" :style="`width: ${$refs.searchWrapper.offsetWidth}px;`" x-transition>
                        <template x-for="res in searchResults" :key="res.id">
                            <div @click="addCardToDeck(res)" class="p-2 border-b border-white/5 flex items-center gap-3 cursor-pointer hover:bg-cyan-400/10 group">
                                <img :src="res.image_uris?.small" class="w-8 h-11 rounded-sm">
                                <p class="text-[10px] font-bold truncate group-hover:text-cyan-400" x-text="res.name"></p>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <div class="scroll-v pr-2">
                <template x-if="viewMode === 'list'">
                    <div>
                        <template x-for="cat in categories" :key="cat">
                            <div x-show="getCardsByCat(cat).length > 0" class="mb-8">
                                <h3 class="category-header text-sm" x-text="cat"></h3>
                                <div class="grid grid-cols-1 gap-1">
                                    <template x-for="card in getCardsByCat(cat)" :key="card.id">
                                        <div class="flex justify-between items-center py-1.5 hover:bg-white/[0.02] px-2 group rounded border-b border-white/[0.02]">
                                            <div class="flex items-center gap-4">
                                                <button x-show="(card.type_line.includes('Creature') || card.type_line.includes('Planeswalker'))" 
                                                        @click="setCommander(card)" 
                                                        class="btn-cmdr-mini" 
                                                        :class="card.isCommander ? 'cmdr-active' : 'cmdr-inactive'"
                                                        x-text="card.isCommander ? 'CMDR' : 'SET CMDR'"></button>
                                                <span @mouseenter="showPreview($event, card.image_uris?.normal)" @mouseleave="hidePreview()" :class="card.isCommander ? 'text-cyan-400 font-bold' : ''" x-text="card.name" class="text-xs truncate group-hover:brand-blue transition-colors"></span>
                                            </div>
                                            <div class="flex items-center gap-4">
                                                <div class="hud-block avail-counter text-[9px]" :class="getUsageStats(card.name).avail < 0 ? 'deficit' : ''" x-text="getUsageStats(card.name).avail + ' AVAIL'"></div>
                                                <div class="flex items-center bg-black/40 rounded border border-white/5">
                                                    <button @click="adjustQty(card, -1)" class="px-3 py-1 text-steel hover:brand-blue">-</button>
                                                    <span class="text-[10px] font-mono w-6 text-center" x-text="card.qty"></span>
                                                    <button @click="adjustQty(card, 1)" class="px-3 py-1 text-steel hover:brand-blue">+</button>
                                                </div>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>

                <template x-if="viewMode === 'visual'">
                    <div class="space-y-12">
                        <template x-for="cat in categories" :key="cat">
                            <div x-show="getCardsByCat(cat).length > 0">
                                <h3 class="category-header text-xs mb-4" x-text="cat"></h3>
                                <div class="visual-grid">
                                    <template x-for="card in getCardsByCat(cat)" :key="card.id">
                                        <div class="relative group">
                                            <img :src="card.image_uris?.normal" class="visual-card" :class="card.isCommander ? 'is-cmdr' : ''">
                                            <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col items-center justify-center gap-4 rounded-lg">
                                                <div class="flex gap-2">
                                                    <button @click="adjustQty(card, -1)" class="w-8 h-8 bg-black border border-cyan-400/40 hover:bg-cyan-400 hover:text-black flex items-center justify-center">-</button>
                                                    <button @click="adjustQty(card, 1)" class="w-8 h-8 bg-black border border-cyan-400/40 hover:bg-cyan-400 hover:text-black flex items-center justify-center">+</button>
                                                </div>
                                                <button x-show="!card.isCommander && (card.type_line.includes('Creature') || card.type_line.includes('Planeswalker'))" 
                                                        @click="setCommander(card)" class="hud-block cmdr-inactive">SET CMDR</button>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </div>

            <div class="mt-4 pt-6 border-t border-cyan-400/10">
                <div class="grid grid-cols-12 gap-8">
                    <div class="col-span-7 panel p-4 bg-black/20">
                        <h4 class="text-[10px] font-bold text-steel uppercase tracking-[0.2em] mb-4">Curve Analysis // CMC Distribution</h4>
                        <div class="flex items-end justify-between h-24 px-2 gap-1">
                            <template x-for="i in [0,1,2,3,4,5,6,7]" :key="i">
                                <div class="flex-1 flex flex-col items-center group">
                                    <div class="w-full bg-cyan-400/10 border-t border-cyan-400/40 relative transition-all duration-500"
                                         :style="`height: ${(getCurveData()[i] / Math.max(...getCurveData(), 1)) * 100}%` ">
                                    </div>
                                    <span class="text-[9px] mt-2 font-mono text-steel" x-text="i === 7 ? '7+' : i"></span>
                                </div>
                            </template>
                        </div>
                    </div>
                    <div class="col-span-5 panel p-4 bg-black/20">
                        <h4 class="text-[10px] font-bold text-steel uppercase tracking-[0.2em] mb-4">Pip Density // Chromatic Weight</h4>
                        <div class="space-y-2.5">
                            <template x-for="(val, color) in getColorWeights()" :key="color">
                                <div class="flex items-center gap-3" x-show="val > 0">
                                    <div class="w-2 h-2 rounded-full" :style="`background: ${getColorHex(color)}`"></div>
                                    <div class="text-[9px] font-mono w-14 text-steel uppercase" x-text="color"></div>
                                    <div class="flex-1 h-1 bg-white/5 rounded-full overflow-hidden">
                                        <div class="h-full transition-all duration-700" 
                                             :style="`width: ${(val / Math.max(...Object.values(getColorWeights()), 1)) * 100}%; background: ${getColorHex(color)}` ">
                                        </div>
                                    </div>
                                    <div class="text-[9px] font-mono text-white w-4 text-right" x-text="val"></div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="import-banner" :class="terminalOpen ? '' : 'collapsed'" x-show="activeDeck" x-data="{ terminalOpen: false, rawList: '' }">
        <div class="p-2 bg-cyan-400/5 cursor-pointer flex justify-between px-4" @click="terminalOpen = !terminalOpen">
            <span class="text-[10px] font-bold brand-blue">UPLINK TERMINAL</span>
            <span class="text-[10px] font-mono text-steel" x-text="terminalOpen ? 'CLOSE' : 'OPEN'"></span>
        </div>
        <div class="p-4 bg-black/90">
            <textarea x-model="rawList" placeholder="1 Sol Ring..." class="w-full h-32 bg-black border border-cyan-400/20 p-2 text-[10px] font-mono text-cyan-200 outline-none focus:border-cyan-400"></textarea>
            <button @click="processImport($data)" class="w-full btn-primary text-[10px] mt-2">INTEGRATE UNITS</button>
        </div>
    </div>

    <script>
        function deckApp() {
            return {
                decks: JSON.parse(localStorage.getItem('decks') || '[]'),
                vault: JSON.parse(localStorage.getItem('forge_vault') || '[]'),
                activeDeck: null, searchQuery: '', searchResults: [], viewMode: 'list',
                categories: ['Commander', 'Creature', 'Sorcery', 'Instant', 'Artifact', 'Enchantment', 'Planeswalker', 'Land'],
                hoverPreview: { visible: false, url: '', x: 0, y: 0 },
                inSidebar: false,
                init() { if(this.decks.length) this.activeDeck = this.decks[0]; },
                moveCursor(e) { if(this.inSidebar) { const c = document.getElementById('custom-cursor'); c.style.left = e.clientX+'px'; c.style.top = e.clientY+'px'; } },
                setCommander(targetCard) {
                    this.activeDeck.cards.forEach(c => c.isCommander = false);
                    targetCard.isCommander = true;
                    this.save();
                },
                getCurveData() {
                    let counts = new Array(8).fill(0);
                    if (!this.activeDeck) return counts;
                    this.activeDeck.cards.forEach(c => {
                        let val = Math.floor(c.cmc || 0);
                        counts[val > 7 ? 7 : val] += c.qty;
                    });
                    return counts;
                },
                getColorWeights() {
                    let w = { white: 0, blue: 0, black: 0, red: 0, green: 0, colorless: 0 };
                    if (!this.activeDeck) return w;
                    this.activeDeck.cards.forEach(c => {
                        const m = c.mana_cost || "";
                        w.white += (m.match(/\{W\}/g) || []).length * c.qty;
                        w.blue += (m.match(/\{U\}/g) || []).length * c.qty;
                        w.black += (m.match(/\{B\}/g) || []).length * c.qty;
                        w.red += (m.match(/\{R\}/g) || []).length * c.qty;
                        w.green += (m.match(/\{G\}/g) || []).length * c.qty;
                        w.colorless += (m.match(/\{C\}/g) || []).length * c.qty;
                    });
                    return w;
                },
                getColorHex(color) {
                    return { white: '#f8f1d1', blue: '#0ea5e9', black: '#a855f7', red: '#ef4444', green: '#22c55e', colorless: '#94a3b8' }[color];
                },
                async searchCards() {
                    if(this.searchQuery.length < 2) return;
                    const res = await fetch(`https://api.scryfall.com/cards/search?q=${encodeURIComponent(this.searchQuery)}`);
                    const d = await res.json(); this.searchResults = d.data?.slice(0, 10) || [];
                },
                addCardToDeck(res) {
                    const existing = this.activeDeck.cards.find(c => c.id === res.id);
                    if(existing) existing.qty++;
                    else this.activeDeck.cards.push({...res, qty: 1, isCommander: false});
                    this.searchQuery = ''; this.searchResults = []; this.save();
                },
                adjustQty(c, v) { c.qty += v; if(c.qty <= 0) this.activeDeck.cards = this.activeDeck.cards.filter(x => x.id !== c.id); this.save(); },
                getCardsByCat(cat) { 
                    if (cat === 'Commander') return this.activeDeck?.cards?.filter(c => c.isCommander) || [];
                    return this.activeDeck?.cards?.filter(c => c.type_line.includes(cat) && !c.isCommander) || []; 
                },
                getUsageStats(name) {
                    const clean = (n) => n.toLowerCase().trim();
                    const total = this.vault.reduce((s, v) => clean(v.name) === clean(name) ? s + v.qty : s, 0);
                    let used = 0;
                    this.decks.forEach(d => {
                        const c = d.cards.find(x => clean(x.name) === clean(name));
                        if(c) used += c.qty;
                    });
                    return { total, avail: total - used };
                },
                getDeckPrice() { return (this.activeDeck?.cards?.reduce((s, c) => s + (parseFloat(c.prices?.usd || 0) * c.qty), 0) || 0).toFixed(2); },
                countAllCards(d) { return d?.cards?.reduce((s, c) => s + c.qty, 0) || 0; },
                save() { localStorage.setItem('decks', JSON.stringify(this.decks)); },
                showPreview(e, url) { this.hoverPreview = { visible: true, url, x: e.clientX, y: e.clientY }; },
                hidePreview() { this.hoverPreview.visible = false; },
                createNewDeck() { const n = prompt("ID:"); if(n) { const d = {id: Date.now(), name: n, cards: []}; this.decks.push(d); this.activeDeck = d; this.save(); } }
            }
        }
    </script>
</body>
</html>
