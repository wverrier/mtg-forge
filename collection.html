<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>FORGE // VAULT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gunmetal: #111c1e; --dark: #1a2527; --cyan: #22d3ee; --steel: #8fa9b0; }
        body { background: var(--gunmetal); color: #e8eef0; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        .panel { background: var(--dark); border: 1px solid rgba(34, 211, 238, 0.1); }
        .brand-blue { color: rgb(34, 211, 238); }
        .scroll-v { overflow-y: auto; height: calc(100vh - 180px); scrollbar-width: thin; scrollbar-color: var(--cyan) transparent; }
    </style>
</head>
<body x-data="vaultApp()" x-init="init()">

    <header class="panel px-6 py-4 flex justify-between items-center border-b border-cyan-400/20 shadow-xl">
        <div class="flex items-center gap-6">
            <a href="index.html" class="text-3xl font-bold brand-blue" style="font-family: 'Bebas Neue'">FORGE // VAULT</a>
            <nav class="flex gap-4 text-[10px] font-bold uppercase tracking-widest text-steel">
                <a href="decks.html" class="hover:brand-blue transition">Decks</a>
                <a href="import.html" class="hover:brand-blue transition">Uplink</a>
            </nav>
        </div>
        <div class="text-xs font-mono text-steel">
            TOTAL UNITS: <span class="brand-blue" x-text="vault.reduce((s,c) => s + c.qty, 0)"></span>
        </div>
    </header>

    <main class="p-6">
        <div class="panel p-6 scroll-v">
            <div class="grid grid-cols-4 gap-4">
                <template x-for="card in vault" :key="card.name">
                    <div class="flex justify-between items-center p-3 bg-black/20 border border-white/5 rounded group">
                        <div>
                            <p class="text-sm font-bold uppercase" x-text="card.name"></p>
                            <p class="text-[10px] text-steel" x-text="card.type"></p>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="font-mono brand-blue font-bold" x-text="'x'+card.qty"></span>
                            <button @click="removeItem(card.name)" class="text-red-500 opacity-0 group-hover:opacity-100 transition text-[10px] font-bold">PURGE</button>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </main>

    <script>
        function vaultApp() {
            return {
                vault: JSON.parse(localStorage.getItem('forge_vault') || '[]'),
                init() {},
                removeItem(name) {
                    if(confirm("Confirm deletion?")) {
                        this.vault = this.vault.filter(c => c.name !== name);
                        localStorage.setItem('forge_vault', JSON.stringify(this.vault));
                    }
                }
            }
        }
    </script>
</body>
</html>
